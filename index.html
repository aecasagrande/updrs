<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MDS-UPDRS Part III</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --navy:#0f172a; --navy2:#1e293b; --navy3:#334155;
  --slate:#475569; --muted:#94a3b8; --border:#e2e8f0; --bg:#f8fafc;
  --blue:#2563eb; --blue-l:#dbeafe; --blue-d:#1d4ed8;
  --green:#16a34a; --green-l:#dcfce7;
  --amber:#d97706; --amber-l:#fef3c7;
  --red:#dc2626; --red-l:#fee2e2;
  --purple:#7c3aed; --purple-l:#ede9fe;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--navy);height:100vh;overflow:hidden;display:flex;}

/* SIDEBAR */
#sidebar{width:272px;min-width:272px;background:var(--navy);display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.sb-top{padding:20px 18px 14px;border-bottom:1px solid rgba(255,255,255,.08);}
.sb-logo{font-family:'Playfair Display',serif;color:#fff;font-size:16px;font-weight:700;line-height:1.3;}
.sb-sub{color:var(--muted);font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin-top:2px;}
.sb-prog{padding:14px 18px;border-bottom:1px solid rgba(255,255,255,.08);}
.sb-prog-lbl{color:var(--muted);font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;}
.prog-track{background:rgba(255,255,255,.1);border-radius:99px;height:4px;margin-bottom:5px;}
.prog-bar{background:linear-gradient(90deg,#3b82f6,#60a5fa);border-radius:99px;height:4px;transition:width .35s ease;width:0%;}
.prog-count{color:rgba(255,255,255,.4);font-size:11px;font-family:'DM Mono',monospace;}
.score-pill{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:10px 14px;margin-top:8px;display:flex;justify-content:space-between;align-items:center;}
.score-pill-lbl{color:var(--muted);font-size:11px;}
.score-pill-val{color:#fff;font-family:'DM Mono',monospace;font-size:22px;font-weight:500;}
#nav{flex:1;overflow-y:auto;padding:6px 0;}
#nav::-webkit-scrollbar{width:4px;}
#nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:99px;}
.nav-phase{padding:10px 18px 3px;color:rgba(255,255,255,.28);font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;}
.nav-item{display:flex;align-items:center;gap:10px;padding:7px 18px;cursor:pointer;border-left:3px solid transparent;transition:background .12s;}
.nav-item:hover{background:rgba(255,255,255,.05);}
.nav-item.active{background:rgba(59,130,246,.15);border-left-color:#3b82f6;}
.nav-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.18);flex-shrink:0;}
.nav-item.active .nav-dot{background:#3b82f6;}
.nav-item.done .nav-dot{background:var(--green);}
.nav-code{color:rgba(255,255,255,.28);font-size:10px;font-family:'DM Mono',monospace;}
.nav-item.active .nav-code{color:#93c5fd;}
.nav-name{color:rgba(255,255,255,.55);font-size:12px;}
.nav-item.active .nav-name{color:#fff;font-weight:500;}
.sb-meta{padding:12px 18px 16px;border-top:1px solid rgba(255,255,255,.08);overflow-y:auto;}
.meta-lbl{display:block;color:var(--muted);font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;margin-bottom:3px;margin-top:8px;}
.meta-inp{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:6px 10px;color:#fff;font-size:12px;font-family:'DM Sans',sans-serif;outline:none;}
.meta-inp:focus{border-color:rgba(99,155,255,.6);}
.meta-inp[type="datetime-local"]{color-scheme:dark;cursor:pointer;}
.meta-sel{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:6px 10px;color:#fff;font-size:12px;font-family:'DM Sans',sans-serif;outline:none;cursor:pointer;}
.meta-sel option{background:#1e293b;}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;}
#topbar{background:#fff;border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.top-left{display:flex;align-items:center;gap:10px;}
.phase-badge{background:var(--blue-l);color:var(--blue);padding:4px 12px;border-radius:99px;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap;}
.top-title{font-size:15px;font-weight:600;color:var(--navy);}
.top-right{display:flex;gap:8px;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all .12s;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--slate);}
.btn-outline:hover{background:var(--bg);}
.btn-green{background:var(--green);color:#fff;}
.btn-green:hover{background:#15803d;}
#content{flex:1;overflow-y:auto;padding:24px 28px;}
#content::-webkit-scrollbar{width:5px;}
#content::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:99px;}

/* ITEM CARD */
.item-card{background:#fff;border:2px solid var(--border);border-radius:14px;margin-bottom:18px;overflow:hidden;}
.item-card.bi-card{border-color:#c4b5fd;}
.item-card.scored-card{border-color:var(--green);}
.ic-head{display:flex;align-items:stretch;}
.ic-code{background:var(--navy);color:#fff;padding:14px 16px;font-family:'DM Mono',monospace;font-size:15px;font-weight:500;display:flex;align-items:center;justify-content:center;min-width:68px;flex-shrink:0;}
.ic-title{flex:1;padding:12px 16px;}
.ic-name{font-size:15px;font-weight:600;color:var(--navy);}
.ic-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.bi-tag{background:var(--purple-l);color:var(--purple);padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700;display:inline-block;margin-top:4px;}
.ic-chips{padding:12px 14px;border-left:1px solid var(--border);display:flex;flex-direction:column;justify-content:center;gap:5px;min-width:84px;flex-shrink:0;}
.chip{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:3px 9px;font-family:'DM Mono',monospace;font-size:13px;color:var(--slate);text-align:center;}
.chip.set{background:var(--green-l);border-color:var(--green);color:var(--green);font-weight:700;}
.ic-body{padding:20px;}

/* boxes */
.say-box{background:#eff6ff;border:1px solid #bfdbfe;border-left:4px solid var(--blue);border-radius:8px;padding:12px 16px;margin-bottom:14px;}
.say-lbl{font-size:10px;font-weight:700;color:var(--blue);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;}
.say-text{font-size:13px;color:#1e40af;font-style:italic;line-height:1.6;}
.admin-box{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:#92400e;line-height:1.55;}

/* scoring */
.sec-lbl{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;margin-bottom:8px;}
.lbl-l{color:var(--purple);} .lbl-r{color:#0369a1;} .lbl-s{color:var(--slate);}
.bi-cols{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:14px;}
.score-row{display:flex;border:1.5px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:14px;}
.s-btn{flex:1;padding:10px 2px;text-align:center;cursor:pointer;background:var(--bg);border:none;border-right:1px solid var(--border);font-family:'DM Sans',sans-serif;transition:background .1s;}
.s-btn:last-child{border-right:none;}
.s-btn:hover{background:#dbeafe;}
.s-n{font-size:20px;font-weight:700;font-family:'DM Mono',monospace;color:var(--navy3);}
.s-l{font-size:9px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-top:2px;}
.s-btn.sel-0{background:#dcfce7;border-color:#86efac;} .s-btn.sel-0 .s-n,.s-btn.sel-0 .s-l{color:#16a34a;}
.s-btn.sel-1{background:#fef9c3;border-color:#fde047;} .s-btn.sel-1 .s-n,.s-btn.sel-1 .s-l{color:#854d0e;}
.s-btn.sel-2{background:#ffedd5;border-color:#fed7aa;} .s-btn.sel-2 .s-n,.s-btn.sel-2 .s-l{color:#c2410c;}
.s-btn.sel-3{background:#fee2e2;border-color:#fca5a5;} .s-btn.sel-3 .s-n,.s-btn.sel-3 .s-l{color:#dc2626;}
.s-btn.sel-4{background:#fecaca;border-color:#f87171;} .s-btn.sel-4 .s-n,.s-btn.sel-4 .s-l{color:#991b1b;}

/* anchors */
.anc-toggle{background:none;border:none;color:var(--blue);font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;padding:0;margin-bottom:8px;}
.anc-table{width:100%;border-collapse:collapse;font-size:12px;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:14px;}
.anc-table th{background:var(--bg);padding:7px 12px;font-size:10px;font-weight:700;color:var(--slate);text-align:left;letter-spacing:.05em;text-transform:uppercase;border-bottom:1px solid var(--border);}
.anc-table td{padding:8px 12px;border-bottom:1px solid var(--border);color:var(--slate);vertical-align:top;}
.anc-table tr:last-child td{border-bottom:none;}
.a-n{font-family:'DM Mono',monospace;font-weight:700;font-size:14px;}
.a0{color:#16a34a;} .a1{color:#854d0e;} .a2{color:#c2410c;} .a3{color:#dc2626;} .a4{color:#991b1b;}
.a-lbl{font-weight:700;font-size:12px;color:var(--navy3);}

.note-inp{width:100%;border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:12px;font-family:'DM Sans',sans-serif;color:var(--navy);outline:none;resize:none;background:#fff;}
.note-inp:focus{border-color:var(--blue);}
.nav-btns{display:flex;justify-content:space-between;margin-top:4px;gap:12px;}
.nav-btn{flex:1;padding:10px 16px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all .12s;}
.nav-btn-p{background:var(--bg);border:1.5px solid var(--border);color:var(--slate);}
.nav-btn-p:hover{background:#e2e8f0;}
.nav-btn-n{background:var(--blue);color:#fff;}
.nav-btn-n:hover{background:var(--blue-d);}

/* WELCOME */
.welcome{max-width:660px;margin:0 auto;}
.hero{background:linear-gradient(135deg,#0f172a,#1e3a5f);border-radius:16px;padding:36px;margin-bottom:18px;color:#fff;}
.hero-eye{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#93c5fd;margin-bottom:10px;}
.hero-h{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;line-height:1.2;margin-bottom:10px;}
.hero-p{color:#cbd5e1;font-size:13px;line-height:1.7;}
.scale-strip{display:flex;gap:6px;margin-top:18px;}
.sc-item{flex:1;background:rgba(255,255,255,.08);border-radius:8px;padding:9px 4px;text-align:center;}
.sc-n{font-size:19px;font-weight:700;font-family:'DM Mono',monospace;}
.sc-l{font-size:9px;color:rgba(255,255,255,.45);margin-top:1px;text-transform:uppercase;}
.opening-box{background:#eff6ff;border:1px solid #bfdbfe;border-left:4px solid var(--blue);border-radius:10px;padding:14px 18px;margin-bottom:18px;}
.opening-lbl{font-size:10px;font-weight:700;color:var(--blue);letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px;}
.opening-txt{font-size:13px;color:#1e40af;font-style:italic;line-height:1.6;}
.phase-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
.ph-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:13px 15px;display:flex;align-items:flex-start;gap:11px;}
.ph-num{background:var(--navy);color:#fff;border-radius:7px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}
.ph-title{font-size:13px;font-weight:600;color:var(--navy);}
.ph-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.start-btn{width:100%;padding:14px;background:var(--blue);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;}
.start-btn:hover{background:var(--blue-d);}

/* SUMMARY */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:11px;margin-bottom:18px;}
.stat-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px;}
.stat-lbl{font-size:11px;color:var(--muted);font-weight:500;margin-bottom:2px;}
.stat-val{font-size:24px;font-family:'DM Mono',monospace;font-weight:500;color:var(--navy);}
.stat-sub{font-size:11px;color:var(--slate);margin-top:2px;}
.rev-card{background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.rev-head{padding:13px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.rev-title{font-size:12px;font-weight:700;color:var(--navy3);letter-spacing:.04em;text-transform:uppercase;}
.rev-scroll{overflow-x:auto;}
.rev-tbl{width:100%;border-collapse:collapse;font-size:13px;}
.rev-tbl th{background:var(--bg);padding:9px 13px;font-size:10px;font-weight:700;color:var(--slate);text-align:left;letter-spacing:.05em;text-transform:uppercase;border-bottom:2px solid var(--border);}
.rev-tbl td{padding:9px 13px;border-bottom:1px solid var(--border);vertical-align:middle;}
.rev-tbl tr:last-child td{border-bottom:none;}
.rev-tbl tr:hover td{background:var(--bg);}
.tot-row td{background:var(--navy)!important;color:#fff!important;font-weight:700!important;}
.stag{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:700;font-family:'DM Mono',monospace;}
.st0{background:var(--green-l);color:var(--green);} .st1{background:var(--amber-l);color:var(--amber);}
.st2{background:#ffedd5;color:#c2410c;} .st3{background:var(--red-l);color:var(--red);}
.st4{background:#fecaca;color:#991b1b;} .stx{background:var(--bg);color:var(--muted);}
.ed{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:4px 7px;font-family:'DM Mono',monospace;font-size:13px;width:52px;text-align:center;outline:none;}
.ed:focus{border-color:var(--blue);background:#fff;}

.fade{animation:fa .2s ease;}
@keyframes fa{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:none;}}
</style>
</head>
<body>

<aside id="sidebar">
  <div class="sb-top">
    <div class="sb-logo">MDS-UPDRS<br>Part III</div>
    <div class="sb-sub">Motor Examination</div>
  </div>
  <div class="sb-prog">
    <div class="sb-prog-lbl">Progress</div>
    <div class="prog-track"><div class="prog-bar" id="progBar"></div></div>
    <div class="prog-count" id="progCount">0 / 18 scored</div>
    <div class="score-pill">
      <span class="score-pill-lbl">Total Score</span>
      <span class="score-pill-val" id="sbTotal">—</span>
    </div>
  </div>
  <nav id="nav"></nav>
  <div class="sb-meta">
    <label class="meta-lbl">Patient ID</label>
    <input class="meta-inp" id="mPatient" placeholder="e.g. PD-2024-001">
    <label class="meta-lbl">Examiner</label>
    <input class="meta-inp" id="mExaminer" placeholder="Name">
    <label class="meta-lbl">Medication Status</label>
    <select class="meta-sel" id="mMeds">
      <option value="">Select…</option>
      <option value="ON">ON</option>
      <option value="OFF">OFF</option>
      <option value="Unknown">Unknown</option>
    </select>
    <label class="meta-lbl">Last Dose Taken At</label>
    <input class="meta-inp" id="mLastDose" type="datetime-local" title="Date and time patient last took Parkinson's medication">
  </div>
</aside>

<main id="main">
  <header id="topbar">
    <div class="top-left">
      <span class="phase-badge" id="topBadge">Overview</span>
      <span class="top-title" id="topTitle">MDS-UPDRS Part III Scorer</span>
    </div>
    <div class="top-right">
      <button class="btn btn-outline" onclick="go('summary')">📋 Review &amp; Edit</button>
      <button class="btn btn-green" onclick="exportExcel()">⬇ Export Excel</button>
    </div>
  </header>
  <div id="content"></div>
</main>

<script>
const ITEMS = [
  {id:'3.1',phase:1,ph:'Observation & Speech',name:'Speech',bi:false,
   say:'Can you tell me a little about why you are here today, or walk me through what you did this morning?',
   admin:'Engage in natural conversation first. Assess volume, clarity, rhythm, and monotony throughout the encounter — not just for this prompt.',
   anc:[[0,'Normal','Normal volume, clarity and rhythm'],[1,'Slight','Slightly low volume or monotone; no difficulty being understood'],[2,'Mild','Slurred or monotone; listener must concentrate; some words unclear'],[3,'Moderate','Significantly difficult to understand; much of speech unintelligible'],[4,'Severe','Mostly unintelligible or mute']]},

  {id:'3.2',phase:1,ph:'Observation & Speech',name:'Facial Expression',bi:false,
   say:'Just look straight ahead at me for a moment with your face relaxed.',
   admin:'Observe throughout conversation AND at rest. Check blink rate and spontaneous smiling.',
   anc:[[0,'Normal','Normal facial mobility; no mask-like features'],[1,'Slight','Slight hypomimia; may appear "serious" — possibly normal for age'],[2,'Mild','Definite hypomimia; decreased blink rate'],[3,'Moderate','Marked hypomimia; mouth may be open at rest'],[4,'Severe','Fixed mask-like face; severe loss of expression; mouth open']]},

  {id:'3.3',phase:2,ph:'Rigidity',name:'Rigidity',bi:true,
   say:'I am going to move your arms. Please let them go completely limp — like a rag doll. Try not to help me or resist.',
   admin:'⚠ Test passively: neck (single score), both wrists, both elbows. If no rigidity detected, apply a distraction task (ask patient to tap the other hand or count backwards) to activate latent rigidity — document if activation was required.',
   anc:[[0,'Absent','No rigidity detected, even with activation'],[1,'Slight','Only detected with activation maneuver'],[2,'Mild','Present without activation; full range of motion easily achieved'],[3,'Moderate','Prominent; full ROM achieved with effort'],[4,'Severe','Cannot achieve full ROM']]},

  {id:'3.4',phase:3,ph:'Motor Tasks (Sitting)',name:'Finger Tapping',bi:true,
   say:'Watch me first. [Demonstrate] Now, with your RIGHT hand, tap your index finger to your thumb as big and as fast as you can — at least 10 times. Now your LEFT hand.',
   admin:'Always demonstrate before each side. Observe for ≥10 repetitions. Assess: speed, amplitude, rhythm, and decrement (progressive decrease in size or speed).',
   anc:[[0,'Normal','No difficulty; normal speed and amplitude'],[1,'Slight','Slight slowing or amplitude reduction; no halting'],[2,'Mild','Moderate difficulty; clear slowing or decrements; occasional arrests'],[3,'Moderate','Significant difficulty; frequent arrests or prolonged hesitations'],[4,'Severe','Barely able to perform; near-absent movement']]},

  {id:'3.5',phase:3,ph:'Motor Tasks (Sitting)',name:'Hand Movements',bi:true,
   say:'Watch me first. [Demonstrate] Make a tight fist, then open your hand as wide as possible. Repeat as fast and as large as you can — at least 10 times. Now your other hand.',
   admin:'Demonstrate first. Amplitude matters as much as speed — small but fast movements still score ≥ 2.',
   anc:[[0,'Normal','No difficulty'],[1,'Slight','Slight slowing or amplitude reduction'],[2,'Mild','Moderate difficulty; occasional arrests or hesitations'],[3,'Moderate','Significant difficulty; frequent arrests or prolonged pauses'],[4,'Severe','Barely able to perform']]},

  {id:'3.6',phase:3,ph:'Motor Tasks (Sitting)',name:'Pronation-Supination',bi:true,
   say:'Watch me first. [Demonstrate] Extend your arm in front of you. Turn your palm up, then palm down, as fast and as large as possible. Now the other arm.',
   admin:'Arm should be extended horizontally. Observe the full amplitude of the rotation arc on each side.',
   anc:[[0,'Normal','No difficulty'],[1,'Slight','Slight slowing or amplitude reduction'],[2,'Mild','Moderate difficulty; clear slowing or decrements'],[3,'Moderate','Significant difficulty; frequent arrests'],[4,'Severe','Barely able to perform']]},

  {id:'3.7',phase:3,ph:'Motor Tasks (Sitting)',name:'Toe Tapping',bi:true,
   say:'Watch me first. [Demonstrate] Keep your heel on the floor and tap your toes up and down as high and as fast as you can — at least 10 times. Now the other foot.',
   admin:'Heel must remain on the floor. Observe height of toe lift (amplitude) as well as speed.',
   anc:[[0,'Normal','No difficulty'],[1,'Slight','Slight slowing or amplitude reduction'],[2,'Mild','Moderate difficulty; occasional arrests'],[3,'Moderate','Significant difficulty; frequent arrests'],[4,'Severe','Barely able to perform']]},

  {id:'3.8',phase:3,ph:'Motor Tasks (Sitting)',name:'Leg Agility (Heel Stomping)',bi:true,
   say:'Watch me first. [Demonstrate] Lift your whole leg and stamp your heel on the ground as high and as fast as you can — at least 10 times. Now the other leg.',
   admin:'Observe height of knee lift (amplitude) as well as speed. Compare symmetry between sides.',
   anc:[[0,'Normal','No difficulty'],[1,'Slight','Slight slowing or amplitude reduction'],[2,'Mild','Moderate difficulty; occasional arrests'],[3,'Moderate','Significant difficulty; frequent arrests'],[4,'Severe','Barely able to perform']]},

  {id:'3.9',phase:4,ph:'Standing & Gait',name:'Arising from Chair',bi:false,
   say:'Please cross your arms over your chest and try to stand up without using your arms to push off. If you truly cannot, you may use them.',
   admin:'Use an armless chair if available. Do not assist unless there is a safety concern. Observe the entire movement arc.',
   anc:[[0,'Normal','Stands in one smooth attempt without using arms'],[1,'Slight','Slow; may need >1 attempt or leans forward slightly'],[2,'Mild','Pushes up using arms from seat of chair'],[3,'Moderate','Tends to fall back; multiple attempts; needs mild assistance'],[4,'Severe','Unable to stand without substantial assistance']]},

// ── STATE ──────────────────────────────────────────────────
let scores = {};
let itemNotes = {};
let curView = 'welcome';
let ancOpen = {};

// ── HELPERS ────────────────────────────────────────────────
function isScored(item){
  if(item.bi) return scores[item.id+'_L']!==undefined && scores[item.id+'_R']!==undefined;
  return scores[item.id]!==undefined;
}
function itemTotal(item){
  if(item.bi){
    const L=scores[item.id+'_L'],R=scores[item.id+'_R'];
    if(L===undefined||R===undefined) return null;
    return L+R;
  }
  return scores[item.id]!==undefined ? scores[item.id] : null;
}
function totalScore(){ return ITEMS.reduce((s,i)=>{const t=itemTotal(i);return s+(t!==null?t:0);},0); }
function scoredCount(){ return ITEMS.filter(isScored).length; }

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── NAV ────────────────────────────────────────────────────
function buildNav(){
  let h='';
  h+=navRow('welcome','','Overview',curView==='welcome',false);
  let lastPhase=null;
  ITEMS.forEach(item=>{
    if(item.phase!==lastPhase){
      h+=`<div class="nav-phase">Phase ${item.phase} · ${item.ph}</div>`;
      lastPhase=item.phase;
    }
    h+=navRow('item-'+item.id,item.id,item.name,curView==='item-'+item.id,isScored(item));
  });
  h+=navRow('summary','','📋 Review & Export',curView==='summary',false);
  document.getElementById('nav').innerHTML=h;
}
function navRow(view,code,name,active,done){
  const cls='nav-item'+(active?' active':'')+(done?' done':'');
  return `<div class="${cls}" onclick="go('${view}')">
    <div class="nav-dot"></div>
    <div>${code?`<div class="nav-code">${code}</div>`:''}
    <div class="nav-name">${name}</div></div>
  </div>`;
}
function updateStats(){
  const n=scoredCount(),ts=totalScore(),pct=Math.round(n/ITEMS.length*100);
  document.getElementById('progBar').style.width=pct+'%';
  document.getElementById('progCount').textContent=n+' / '+ITEMS.length+' scored';
  document.getElementById('sbTotal').textContent=n>0?ts:'—';
}

// ── ROUTING ────────────────────────────────────────────────
function go(view){
  curView=view;
  buildNav();
  updateStats();
  const el=document.getElementById('content');
  el.innerHTML='';
  el.className='fade';
  setTimeout(()=>el.classList.remove('fade'),300);

  if(view==='welcome'){
    document.getElementById('topBadge').textContent='Overview';
    document.getElementById('topTitle').textContent='MDS-UPDRS Part III Scorer';
    el.innerHTML=welcomeHTML();
  } else if(view==='summary'){
    document.getElementById('topBadge').textContent='Review';
    document.getElementById('topTitle').textContent='Score Summary & Export';
    el.innerHTML=summaryHTML();
    bindSummary();
  } else if(view.startsWith('item-')){
    const id=view.replace('item-','');
    const item=ITEMS.find(i=>i.id===id);
    if(!item) return;
    document.getElementById('topBadge').textContent=`Phase ${item.phase} · ${item.ph}`;
    document.getElementById('topTitle').textContent=item.id+' · '+item.name;
    el.innerHTML=itemHTML(item);
    bindItem(item);
  }
}

// ── ITEM ───────────────────────────────────────────────────
function scoreRowHTML(key){
  const cur=scores[key];
  const lbls=['Normal','Slight','Mild','Moderate','Severe'];
  return '<div class="score-row">'+[0,1,2,3,4].map(v=>{
    const sel=cur===v?`sel-${v}`:'';
    return `<button class="s-btn ${sel}" data-key="${key}" data-val="${v}"><div class="s-n">${v}</div><div class="s-l">${lbls[v]}</div></button>`;
  }).join('')+'</div>';
}

function anchorTableHTML(item){
  if(!ancOpen[item.id]) return '';
  const rows=item.anc.map(([n,lbl,desc])=>
    `<tr><td><span class="a-n a${n}">${n}</span></td><td><span class="a-lbl">${lbl}</span></td><td>${esc(desc)}</td></tr>`
  ).join('');
  return `<div><table class="anc-table"><thead><tr><th>Score</th><th>Label</th><th>Description</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

function itemHTML(item){
  const idx=ITEMS.findIndex(i=>i.id===item.id);
  const prev=idx>0?ITEMS[idx-1]:null;
  const next=idx<ITEMS.length-1?ITEMS[idx+1]:null;
  const scored=isScored(item);

  let previewChips='';
  if(item.bi){
    const L=scores[item.id+'_L'],R=scores[item.id+'_R'];
    previewChips=`<div class="chip ${L!==undefined?'set':''}">L: ${L!==undefined?L:'—'}</div>
                  <div class="chip ${R!==undefined?'set':''}">R: ${R!==undefined?R:'—'}</div>`;
  } else {
    const s=scores[item.id];
    previewChips=`<div class="chip ${s!==undefined?'set':''}">${s!==undefined?s:'—'}</div>`;
  }

  let scoringHTML='';
  if(item.bi){
    scoringHTML=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:4px;">
      <div><div class="sec-lbl lbl-l">◀ LEFT</div>${scoreRowHTML(item.id+'_L')}</div>
      <div><div class="sec-lbl lbl-r">▶ RIGHT</div>${scoreRowHTML(item.id+'_R')}</div>
    </div>`;
  } else {
    scoringHTML=`<div class="sec-lbl lbl-s">Score</div>${scoreRowHTML(item.id)}`;
  }

  const cardCls='item-card'+(item.bi?' bi-card':'')+(scored?' scored-card':'');
  const ancLabel=ancOpen[item.id]?'▲ Hide grading anchors':'▼ Show grading anchors';

  return `<div class="${cardCls}">
  <div class="ic-head">
    <div class="ic-code">${item.id}</div>
    <div class="ic-title">
      <div class="ic-name">${item.name}</div>
      ${item.bi?'<span class="bi-tag">Score Left &amp; Right separately</span>':'<div class="ic-sub">Single score</div>'}
    </div>
    <div class="ic-chips">${previewChips}</div>
  </div>
  <div class="ic-body">
    <div class="admin-box">ℹ ${esc(item.admin)}</div>
    ${item.say?`<div class="say-box"><div class="say-lbl">Say to patient</div><div class="say-text">"${esc(item.say)}"</div></div>`:''}
    ${scoringHTML}
    <button class="anc-toggle" id="ancBtn">${ancLabel}</button>
    <div id="ancWrap">${anchorTableHTML(item)}</div>
    <div style="margin-top:12px;">
      <div style="font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;">Notes</div>
      <textarea class="note-inp" id="noteArea" rows="2" placeholder="Optional notes for this item…">${esc(itemNotes[item.id]||'')}</textarea>
    </div>
  </div>
</div>
<div class="nav-btns">
  <button class="nav-btn nav-btn-p" onclick="go('${prev?'item-'+prev.id:'welcome'}')">← ${prev?prev.id+' · '+prev.name:'Overview'}</button>
  <button class="nav-btn nav-btn-n" onclick="go('${next?'item-'+next.id:'summary'}')">${next?next.id+' · '+next.name+' →':'📋 Review & Export →'}</button>
</div>`;
}

function bindItem(item){
  // Score buttons — direct onclick, no re-render loop
  document.querySelectorAll('.s-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const key=btn.dataset.key, val=parseInt(btn.dataset.val);
      scores[key]=val;
      // Update button styles in place without full re-render
      const row=btn.closest('.score-row');
      row.querySelectorAll('.s-btn').forEach((b,i)=>{
        b.className='s-btn'+(i===val?` sel-${val}`:'');
      });
      // Update preview chips
      updateChips(item);
      // Update card border
      const card=document.querySelector('.item-card');
      if(isScored(item)){card.classList.add('scored-card');}
      updateStats();
      buildNav();
    });
  });

  // Anchor toggle
  document.getElementById('ancBtn').addEventListener('click',()=>{
    ancOpen[item.id]=!ancOpen[item.id];
    document.getElementById('ancBtn').textContent=ancOpen[item.id]?'▲ Hide grading anchors':'▼ Show grading anchors';
    document.getElementById('ancWrap').innerHTML=anchorTableHTML(item);
  });

  // Notes
  document.getElementById('noteArea').addEventListener('input',e=>{
    itemNotes[item.id]=e.target.value;
  });
}

function updateChips(item){
  const chips=document.querySelector('.ic-chips');
  if(!chips) return;
  if(item.bi){
    const L=scores[item.id+'_L'],R=scores[item.id+'_R'];
    chips.innerHTML=`<div class="chip ${L!==undefined?'set':''}">L: ${L!==undefined?L:'—'}</div>
                     <div class="chip ${R!==undefined?'set':''}">R: ${R!==undefined?R:'—'}</div>`;
  } else {
    const s=scores[item.id];
    chips.innerHTML=`<div class="chip ${s!==undefined?'set':''}">${s!==undefined?s:'—'}</div>`;
  }
}

// ── SUMMARY ────────────────────────────────────────────────
function stTag(v){
  if(v===undefined||v===null) return '<span class="stag stx">—</span>';
  return `<span class="stag st${Math.min(4,v)}">${v}</span>`;
}

function summaryHTML(){
  const n=scoredCount(),ts=totalScore();
  const patient=document.getElementById('mPatient').value||'—';
  const examiner=document.getElementById('mExaminer').value||'—';
  const meds=document.getElementById('mMeds').value||'—';
  const rawDose=document.getElementById('mLastDose').value;
  const lastDose=rawDose?new Date(rawDose).toLocaleString():'—';
  const maxPts=ITEMS.reduce((a,i)=>a+(i.bi?8:4),0);

  const rows=ITEMS.map(item=>{
    const t=itemTotal(item);
    if(item.bi){
      const L=scores[item.id+'_L'],R=scores[item.id+'_R'];
      return `<tr>
        <td><strong style="font-family:'DM Mono',monospace">${item.id}</strong></td>
        <td>${item.name}</td>
        <td style="color:var(--muted);font-size:12px">Ph.${item.phase}</td>
        <td style="text-align:center"><input class="ed" data-key="${item.id}_L" type="number" min="0" max="4" value="${L!==undefined?L:''}" placeholder="—"></td>
        <td style="text-align:center"><input class="ed" data-key="${item.id}_R" type="number" min="0" max="4" value="${R!==undefined?R:''}" placeholder="—"></td>
        <td style="text-align:center" class="item-tot-cell" data-id="${item.id}">${stTag(t)}</td>
        <td><input type="text" class="note-inp sum-note" style="height:32px;padding:4px 10px;" data-id="${item.id}" value="${esc(itemNotes[item.id]||'')}" placeholder="notes…"></td>
      </tr>`;
    } else {
      const s=scores[item.id];
      return `<tr>
        <td><strong style="font-family:'DM Mono',monospace">${item.id}</strong></td>
        <td>${item.name}</td>
        <td style="color:var(--muted);font-size:12px">Ph.${item.phase}</td>
        <td style="text-align:center" colspan="2"><input class="ed" data-key="${item.id}" type="number" min="0" max="4" value="${s!==undefined?s:''}" placeholder="—"></td>
        <td style="text-align:center" class="item-tot-cell" data-id="${item.id}">${stTag(s)}</td>
        <td><input type="text" class="note-inp sum-note" style="height:32px;padding:4px 10px;" data-id="${item.id}" value="${esc(itemNotes[item.id]||'')}" placeholder="notes…"></td>
      </tr>`;
    }
  }).join('');

  return `
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-lbl">Total Score</div><div class="stat-val" id="sumTot">${ts}</div><div class="stat-sub">out of ${maxPts} max</div></div>
    <div class="stat-card"><div class="stat-lbl">Items Scored</div><div class="stat-val">${n}/${ITEMS.length}</div><div class="stat-sub">${ITEMS.length-n} remaining</div></div>
    <div class="stat-card"><div class="stat-lbl">Patient / Examiner</div><div class="stat-val" style="font-size:15px;margin-top:5px">${esc(patient)}</div><div class="stat-sub">${esc(examiner)}</div></div>
    <div class="stat-card"><div class="stat-lbl">Meds · Last Dose</div><div class="stat-val" style="font-size:15px;margin-top:5px">${esc(meds)}</div><div class="stat-sub">${esc(lastDose)}</div></div>
  </div>
  <div class="rev-card">
    <div class="rev-head">
      <span class="rev-title">Score Sheet — edit any value inline</span>
      <button class="btn btn-green" onclick="exportExcel()">⬇ Export Excel</button>
    </div>
    <div class="rev-scroll">
      <table class="rev-tbl">
        <thead><tr><th>Item</th><th>Name</th><th>Phase</th><th style="text-align:center">Left/Single</th><th style="text-align:center">Right</th><th style="text-align:center">Total</th><th>Notes</th></tr></thead>
        <tbody>${rows}</tbody>
        <tfoot><tr class="tot-row">
          <td colspan="5" style="text-align:right;font-size:14px;padding:11px 13px;">TOTAL SCORE</td>
          <td style="text-align:center;padding:11px 13px"><span style="font-family:'DM Mono',monospace;font-size:20px" id="footTot">${ts}</span></td>
          <td style="padding:11px 13px;opacity:.5">/ ${maxPts}</td>
        </tr></tfoot>
      </table>
    </div>
  </div>`;
}

function bindSummary(){
  document.querySelectorAll('.ed').forEach(inp=>{
    inp.addEventListener('change',()=>{
      const key=inp.dataset.key, v=parseInt(inp.value);
      if(!isNaN(v)&&v>=0&&v<=4){ scores[key]=v; } else { delete scores[key]; inp.value=''; }
      // Update totals
      const ts=totalScore();
      const el1=document.getElementById('sumTot'), el2=document.getElementById('footTot');
      if(el1) el1.textContent=ts; if(el2) el2.textContent=ts;
      // Update item total cell
      const itemId=key.replace(/_[LR]$/,'');
      const item=ITEMS.find(i=>i.id===itemId);
      if(item){
        document.querySelectorAll(`.item-tot-cell[data-id="${itemId}"]`).forEach(cell=>{
          cell.innerHTML=stTag(itemTotal(item));
        });
      }
      updateStats(); buildNav();
    });
  });
  document.querySelectorAll('.sum-note').forEach(inp=>{
    inp.addEventListener('input',()=>{ itemNotes[inp.dataset.id]=inp.value; });
  });
}

// ── EXPORT ────────────────────────────────────────────────
function exportExcel(){
  const wb=XLSX.utils.book_new();
  const patient=document.getElementById('mPatient').value||'';
  const examiner=document.getElementById('mExaminer').value||'';
  const meds=document.getElementById('mMeds').value||'';
  const rawDose=document.getElementById('mLastDose').value;
  const lastDose=rawDose?new Date(rawDose).toLocaleString():'';
  const maxPts=ITEMS.reduce((a,i)=>a+(i.bi?8:4),0);

  const data=[
    ['MDS-UPDRS Part III · Motor Examination'],
    [],
    ['Patient ID',patient],['Examiner',examiner],
    ['Date',new Date().toLocaleDateString()],['Time',new Date().toLocaleTimeString()],
    ['Medication Status',meds],['Last Dose Taken At',lastDose],
    [],
    ['Item','Name','Phase','Left / Single','Right','Item Total','Notes'],
  ];
  ITEMS.forEach(item=>{
    if(item.bi){
      const L=scores[item.id+'_L'],R=scores[item.id+'_R'];
      data.push([item.id,item.name,`Ph.${item.phase} · ${item.ph}`,
        L!==undefined?L:'',R!==undefined?R:'',
        (L!==undefined&&R!==undefined)?L+R:'',itemNotes[item.id]||'']);
    } else {
      const s=scores[item.id];
      data.push([item.id,item.name,`Ph.${item.phase} · ${item.ph}`,
        s!==undefined?s:'','',s!==undefined?s:'',itemNotes[item.id]||'']);
    }
  });
  data.push([],['TOTAL SCORE','','','','',totalScore(),`/ ${maxPts} max`]);

  const ws1=XLSX.utils.aoa_to_sheet(data);
  ws1['!cols']=[{wch:8},{wch:32},{wch:26},{wch:14},{wch:10},{wch:12},{wch:42}];
  XLSX.utils.book_append_sheet(wb,ws1,'Scores');

  const raw=[['Key','Score','Item Name','Side']];
  ITEMS.forEach(item=>{
    if(item.bi){['L','R'].forEach(s=>raw.push([item.id+'_'+s,scores[item.id+'_'+s]!==undefined?scores[item.id+'_'+s]:'',item.name,s]));}
    else{raw.push([item.id,scores[item.id]!==undefined?scores[item.id]:'',item.name,'N/A']);}
  });
  raw.push(['TOTAL',totalScore(),'','']);
  const ws2=XLSX.utils.aoa_to_sheet(raw);
  ws2['!cols']=[{wch:14},{wch:8},{wch:32},{wch:8}];
  XLSX.utils.book_append_sheet(wb,ws2,'Raw Data');

  XLSX.writeFile(wb,`UPDRS_III_${patient||'patient'}_${new Date().toISOString().slice(0,10)}.xlsx`);
}

// ── INIT ──────────────────────────────────────────────────
go('welcome');
</script>
