<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MDS-UPDRS Part III</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Merriweather:wght@700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --navy: #0f172a; --navy2: #1e293b; --navy3: #334155;
  --slate: #475569; --muted: #94a3b8; --border: #cbd5e1; --bg: #f8fafc;
  --blue: #2563eb; --blue-l: #eff6ff; --blue-d: #1d4ed8;
  --green: #16a34a; --green-l: #f0fdf4;
  --amber: #d97706; --amber-l: #fffbeb;
  --red: #dc2626; --red-l: #fef2f2;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; width: 100%; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--navy); overflow: hidden; display: flex; -webkit-font-smoothing: antialiased; }

/* SIDEBAR */
#sidebar { width: 320px; min-width: 320px; background: var(--navy); display: flex; flex-direction: column; height: 100%; overflow: hidden; flex-shrink: 0; }
.sb-top { padding: 24px 20px 16px; border-bottom: 1px solid rgba(255,255,255,.08); }
.sb-logo { font-family: 'Merriweather', serif; color: #fff; font-size: 20px; font-weight: 700; line-height: 1.3; }
.sb-sub { color: #93c5fd; font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; margin-top: 4px; }
.sb-prog { padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,.08); }
.prog-track { background: rgba(255,255,255,.1); border-radius: 99px; height: 6px; margin-bottom: 6px; }
.prog-bar { background: #3b82f6; border-radius: 99px; height: 6px; transition: width .35s ease; width: 0%; }
.prog-count { color: rgba(255,255,255,.6); font-size: 13px; font-weight: 500; }
#nav { flex: 1; overflow-y: auto; padding: 8px 0; min-height: 0; }
#nav::-webkit-scrollbar { width: 6px; }
#nav::-webkit-scrollbar-thumb { background: rgba(255,255,255,.2); border-radius: 99px; }
.nav-phase { padding: 14px 20px 4px; color: rgba(255,255,255,.4); font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; }
.nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 20px; cursor: pointer; border-left: 4px solid transparent; transition: background .15s; }
.nav-item:hover { background: rgba(255,255,255,.05); }
.nav-item.active { background: rgba(59,130,246,.2); border-left-color: #3b82f6; }
.nav-dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,.2); flex-shrink: 0; }
.nav-item.active .nav-dot { background: #60a5fa; box-shadow: 0 0 8px rgba(96,165,250,.5); }
.nav-item.done .nav-dot { background: #4ade80; }
.nav-code { color: rgba(255,255,255,.4); font-size: 12px; font-weight: 600; width: 34px; }
.nav-item.active .nav-code { color: #93c5fd; }
.nav-name { color: rgba(255,255,255,.7); font-size: 14px; flex: 1; }
.nav-item.active .nav-name { color: #fff; font-weight: 600; }

.sb-meta { padding: 16px 20px 24px; border-top: 1px solid rgba(255,255,255,.08); overflow-y: auto; max-height: 40vh; flex-shrink: 0; }
.meta-lbl { display: block; color: var(--muted); font-size: 11px; font-weight: 600; text-transform: uppercase; margin: 12px 0 4px; }
.meta-inp, .meta-sel { width: 100%; background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.15); border-radius: 8px; padding: 10px 12px; color: #fff; font-size: 14px; font-family: 'Inter', sans-serif; outline: none; }
.meta-inp:focus, .meta-sel:focus { border-color: #60a5fa; background: rgba(255,255,255,.1); }
.meta-sel option { background: #1e293b; color: #fff; }
.meta-inp[type="datetime-local"] { color-scheme: dark; cursor: pointer; }

/* MAIN AREA */
#main { flex: 1; display: flex; flex-direction: column; min-width: 0; height: 100%; }
#topbar { background: #fff; border-bottom: 1px solid var(--border); padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.phase-badge { background: var(--blue-l); color: var(--blue-d); padding: 6px 14px; border-radius: 99px; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; }
.top-title { font-size: 18px; font-weight: 700; color: var(--navy); margin-left: 14px; }
.btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 18px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; font-family: 'Inter', sans-serif; transition: 0.15s; }
.btn-green { background: var(--green); color: #fff; }
.btn-green:hover { background: #15803d; }

/* FIX FOR MOBILE: min-height: 0 is required for flex scrolling */
#content { flex: 1; overflow-y: auto; padding: 32px 40px; min-height: 0; }
#content::-webkit-scrollbar { width: 8px; }
#content::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 99px; }

/* ITEM CONTENT */
.admin-box { background: var(--amber-l); border: 1px solid #fde68a; border-left: 4px solid #f59e0b; border-radius: 8px; padding: 16px 20px; margin-bottom: 24px; font-size: 15px; color: #92400e; line-height: 1.6; max-width: 900px; }
.admin-box strong { color: #b45309; }

/* TABS FOR MULTI-PART ITEMS */
.part-tabs { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; max-width: 900px; }
.part-tab { padding: 12px 24px; border-radius: 10px; background: #e2e8f0; font-size: 15px; font-weight: 600; color: var(--slate); cursor: pointer; transition: 0.2s; border: 2px solid transparent; }
.part-tab.active { background: var(--blue); color: #fff; box-shadow: 0 4px 12px rgba(37,99,235,.2); }
.part-tab.scored:not(.active) { background: var(--green-l); color: var(--green); border-color: #bbf7d0; }

/* SCORE CARDS */
.score-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 32px; max-width: 900px; }
.s-card { display: flex; align-items: flex-start; gap: 16px; padding: 16px 20px; background: #fff; border: 2px solid var(--border); border-radius: 12px; cursor: pointer; transition: all 0.2s; }
.s-card.selected { border-color: var(--blue); background: var(--blue-l); box-shadow: 0 4px 12px rgba(37,99,235,.1); }
.sc-num { font-size: 24px; font-weight: 700; color: var(--slate); width: 28px; text-align: center; flex-shrink: 0; line-height: 1.1; }
.s-card.selected .sc-num { color: var(--blue); }
.sc-body { flex: 1; }
.sc-title { font-size: 16px; font-weight: 700; color: var(--navy); margin-bottom: 4px; }
.s-card.selected .sc-title { color: var(--blue-d); }
.sc-desc { font-size: 14.5px; color: var(--slate); line-height: 1.5; opacity: 0.85; }

/* NAVIGATION BUTTONS */
.nav-btns { display: flex; justify-content: space-between; max-width: 900px; margin-top: 16px; gap: 16px; padding-top: 24px; border-top: 1px solid var(--border); }
.nav-btn { flex: 1; padding: 16px 24px; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; border: none; font-family: 'Inter', sans-serif; transition: 0.15s; text-align: center; }
.nav-btn-p { background: #fff; border: 2px solid var(--border); color: var(--slate); }
.nav-btn-n { background: var(--blue); color: #fff; box-shadow: 0 4px 12px rgba(37,99,235,.25); }

/* WELCOME & SUMMARY */
.hero { background: var(--navy2); border-radius: 16px; padding: 40px; margin-bottom: 32px; color: #fff; max-width: 900px; }
.hero-h { font-family: 'Merriweather', serif; font-size: 32px; font-weight: 700; line-height: 1.2; margin-bottom: 12px; }
.hero-p { color: #cbd5e1; font-size: 16px; line-height: 1.6; }

.sum-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; margin-bottom: 24px; max-width: 900px; }
.stat-card { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,.03); }
.stat-lbl { font-size: 13px; color: var(--slate); font-weight: 600; text-transform: uppercase; margin-bottom: 4px; }
.stat-val { font-size: 28px; font-weight: 700; color: var(--navy); }

.rev-tbl { width: 100%; max-width: 1000px; border-collapse: collapse; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.04); border: 1px solid var(--border); }
.rev-tbl th { background: var(--bg); padding: 14px 16px; font-size: 12px; font-weight: 700; color: var(--slate); text-align: left; text-transform: uppercase; border-bottom: 2px solid var(--border); }
.rev-tbl td { padding: 14px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; font-size: 15px; color: var(--navy); }
.tag { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 14px; font-weight: 700; background: var(--blue-l); color: var(--blue-d); }
.tag.miss { background: var(--red-l); color: var(--red); }
.tot-row td { background: var(--navy2) !important; color: #fff !important; font-weight: 700; font-size: 18px; }

/* RESPONSIVE FIX FOR PORTRAIT TABLETS */
@media (max-width: 900px) {
  #sidebar { width: 260px; min-width: 260px; }
  .top-title { font-size: 16px; }
  #content { padding: 24px; }
  .s-card { padding: 12px 16px; gap: 12px; }
  .sc-num { font-size: 20px; width: 20px; }
  .sc-title { font-size: 15px; }
  .sc-desc { font-size: 13.5px; }
}
</style>
</head>
<body>

<aside id="sidebar">
  <div class="sb-top">
    <div class="sb-logo">MDS-UPDRS</div>
    <div class="sb-sub">Part III: Motor Examination</div>
  </div>
  <div class="sb-prog">
    <div class="prog-track"><div class="prog-bar" id="progBar"></div></div>
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <div class="prog-count" id="progCount">0 / 33 rated</div>
      <div style="color:#fff; font-weight:700; font-size:18px;" id="sbTotal">0 pts</div>
    </div>
  </div>
  <nav id="nav"></nav>
  
  <div class="sb-meta">
    <label class="meta-lbl">Patient ID</label>
    <input class="meta-inp" id="mPatient" placeholder="e.g. Pt-1234">

    <label class="meta-lbl">Researcher Name</label>
    <input class="meta-inp" id="mResearcher" placeholder="e.g. Dr. Smith">
    
    <label class="meta-lbl">Medication State</label>
    <select class="meta-sel" id="mState">
      <option value="">Select...</option>
      <option value="ON">ON</option>
      <option value="OFF">OFF</option>
    </select>

    <label class="meta-lbl">Last Dose Taken</label>
    <input class="meta-inp" id="mLastDose" type="datetime-local" title="Select date and time">
  </div>
</aside>

<main id="main">
  <header id="topbar">
    <div style="display:flex; align-items:center;">
      <span class="phase-badge" id="topBadge">Overview</span>
      <span class="top-title" id="topTitle">Administration</span>
    </div>
    <button class="btn btn-green" onclick="exportExcel()">⬇ Export to Excel</button>
  </header>
  <div id="content"></div>
</main>

<script>
const ITEMS = [
  { id: '3.1', phase: 1, ph: 'Observation & Speech', name: 'Speech',
    admin: 'Listen to the patient’s free-flowing speech and engage in conversation if necessary. Suggested topics: ask about the patient’s work, hobbies, exercise, or how he got to the doctor’s office. Evaluate volume, modulation (prosody), and clarity, including slurring, palilalia (repetition of syllables), and tachyphemia (rapid speech, running syllables together).',
    parts: [{id: 'Single', name: 'Score'}],
    anc: [
      ['Normal', 'No speech problems.'],
      ['Slight', 'Loss of modulation, diction, or volume, but still all words easy to understand.'],
      ['Mild', 'Loss of modulation, diction, or volume, with a few words unclear, but the overall sentences easy to follow.'],
      ['Moderate', 'Speech is difficult to understand to the point that some, but not most, sentences are poorly understood.'],
      ['Severe', 'Most speech is difficult to understand or unintelligible.']
    ]
  },
  { id: '3.2', phase: 1, ph: 'Observation & Speech', name: 'Facial Expression',
    admin: 'Observe the patient sitting at rest for 10 seconds, without talking and also while talking. Observe eye-blink frequency, masked facies or loss of facial expression, spontaneous smiling, and parting of lips.',
    parts: [{id: 'Single', name: 'Score'}],
    anc: [
      ['Normal', 'Normal facial expression.'],
      ['Slight', 'Minimal masked facies manifested only by decreased frequency of blinking.'],
      ['Mild', 'In addition to decreased eye-blink frequency, masked facies present in the lower face as well, namely fewer movements around the mouth, such as less spontaneous smiling, but lips not parted.'],
      ['Moderate', 'Masked facies with lips parted some of the time when the mouth is at rest.'],
      ['Severe', 'Masked facies with lips parted most of the time when the mouth is at rest.']
    ]
  },
  { id: '3.3', phase: 2, ph: 'Rigidity', name: 'Rigidity',
    admin: 'Rigidity is judged on slow passive movement of major joints with the patient in a relaxed position and the examiner manipulating the limbs and neck. First, test without an activation maneuver. Test and rate neck and each limb separately. For arms, test the wrist and elbow joints simultaneously. For legs, test the hip and knee joints simultaneously. If no rigidity is detected, use an activation maneuver such as tapping fingers, fist opening/closing, or heel tapping in a limb not being tested. Explain to the patient to go as limp as possible as you test for rigidity.',
    parts: [
      {id: 'Neck', name: 'Neck'}, {id: 'RUE', name: 'Right Upper Extremity (RUE)'}, {id: 'LUE', name: 'Left Upper Extremity (LUE)'}, {id: 'RLE', name: 'Right Lower Extremity (RLE)'}, {id: 'LLE', name: 'Left Lower Extremity (LLE)'}
    ],
    anc: [
      ['Normal', 'No rigidity.'],
      ['Slight', 'Rigidity only detected with activation maneuver.'],
      ['Mild', 'Rigidity detected without the activation maneuver, but full range of motion is easily achieved.'],
      ['Moderate', 'Rigidity detected without the activation maneuver; full range of motion is achieved with effort.'],
      ['Severe', 'Rigidity detected without the activation maneuver and full range of motion not achieved.']
    ]
  },
  { id: '3.4', phase: 3, ph: 'Motor Tasks (Sitting)', name: 'Finger Tapping',
    admin: 'Each hand is tested separately. Demonstrate the task, but do not continue to perform the task while the patient is being tested. Instruct the patient to tap the index finger on the thumb 10 times as quickly AND as big as possible. Rate each side separately, evaluating speed, amplitude, hesitations, halts, and decrementing amplitude.',
    parts: [{id: 'R', name: 'Right Hand'}, {id: 'L', name: 'Left Hand'}],
    anc: [
      ['Normal', 'No problems.'],
      ['Slight', 'Any of the following: a) the regular rhythm is broken with one or two interruptions or hesitations of the tapping movement; b) slight slowing; c) the amplitude decrements near the end of the 10 taps.'],
      ['Mild', 'Any of the following: a) 3 to 5 interruptions during tapping; b) mild slowing; c) the amplitude decrements midway in the 10-tap sequence.'],
      ['Moderate', 'Any of the following: a) more than 5 interruptions during tapping or at least one longer arrest (freeze) in ongoing movement; b) moderate slowing; c) the amplitude decrements starting after the 1st tap.'],
      ['Severe', 'Cannot or can only barely perform the task because of slowing, interruptions, or decrements.']
    ]
  },
  { id: '3.5', phase: 3, ph: 'Motor Tasks (Sitting)', name: 'Hand Movements',
    admin: 'Test each hand separately. Demonstrate the task, but do not continue to perform the task while the patient is being tested. Instruct the patient to make a tight fist with the arm bent at the elbow so that the palm faces the examiner. Have the patient open the hand 10 times as fully AND as quickly as possible. If the patient fails to make a tight fist or to open the hand fully, remind him/her to do so. Rate each side separately, evaluating speed, amplitude, hesitations, halts, and decrementing amplitude.',
    parts: [{id: 'R', name: 'Right Hand'}, {id: 'L', name: 'Left Hand'}],
    anc: [
      ['Normal', 'No problems.'],
      ['Slight', 'Any of the following: a) the regular rhythm is broken with one or two interruptions or hesitations of the movement; b) slight slowing; c) the amplitude decrements near the end of the task.'],
      ['Mild', 'Any of the following: a) 3 to 5 interruptions during the movements; b) mild slowing; c) the amplitude decrements midway in the task.'],
      ['Moderate', 'Any of the following: a) more than 5 interruptions during the movement or at least one longer arrest (freeze) in ongoing movement; b) moderate slowing; c) the amplitude decrements starting after the 1st open-and-close sequence.'],
      ['Severe', 'Cannot or can only barely perform the task because of slowing, interruptions, or decrements.']
    ]
  },
  { id: '3.6', phase: 3, ph: 'Motor Tasks (Sitting)', name: 'Pronation-Supination',
    admin: 'Test each hand separately. Demonstrate the task, but do not continue to perform the task while the patient is being tested. Instruct the patient to extend the arm out in front of his/her body with the palms down, and then to turn the palm up and down alternately 10 times as fast and as fully as possible. Rate each side separately, evaluating speed, amplitude, hesitations, halts, and decrementing amplitude.',
    parts: [{id: 'R', name: 'Right Hand'}, {id: 'L', name: 'Left Hand'}],
    anc: [
      ['Normal', 'No problems.'],
      ['Slight', 'Any of the following: a) the regular rhythm is broken with one or two interruptions or hesitations of the movement; b) slight slowing; c) the amplitude decrements near the end of the sequence.'],
      ['Mild', 'Any of the following: a) 3 to 5 interruptions during the movements; b) mild slowing; c) the amplitude decrements midway in the sequence.'],
      ['Moderate', 'Any of the following: a) more than 5 interruptions during the movement or at least one longer arrest (freeze) in ongoing movement; b) moderate slowing; c) the amplitude decrements starting after the 1st supination-pronation sequence.'],
      ['Severe', 'Cannot or can only barely perform the task because of slowing, interruptions, or decrements.']
    ]
  },
  { id: '3.7', phase: 3, ph: 'Motor Tasks (Sitting)', name: 'Toe Tapping',
    admin: 'Have the patient sit in a straight-backed chair with arms, both feet on the floor. Test each foot separately. Demonstrate the task, but do not continue to perform the task while the patient is being tested. Instruct the patient to place the heel on the ground in a comfortable position and then tap the toes 10 times as big and as fast as possible. Rate each side separately, evaluating speed, amplitude, hesitations, halts, and decrementing amplitude.',
    parts: [{id: 'R', name: 'Right Foot'}, {id: 'L', name: 'Left Foot'}],
    anc: [
      ['Normal', 'No problems.'],
      ['Slight', 'Any of the following: a) the regular rhythm is broken with one or two interruptions or hesitations of the tapping movement; b) slight slowing; c) amplitude decrements near the end of the ten taps.'],
      ['Mild', 'Any of the following: a) 3 to 5 interruptions during the tapping movements; b) mild slowing; c) amplitude decrements midway in the task.'],
      ['Moderate', 'Any of the following: a) more than 5 interruptions during the tapping movements or at least one longer arrest (freeze) in ongoing movement; b) moderate slowing; c) amplitude decrements after the 1st tap.'],
      ['Severe', 'Cannot or can only barely perform the task because of slowing, interruptions or decrements.']
    ]
  },
  { id: '3.8', phase: 3, ph: 'Motor Tasks (Sitting)', name: 'Leg Agility',
    admin: 'Have the patient sit in a straight-backed chair with arms. The patient should have both feet comfortably on the floor. Test each leg separately. Demonstrate the task, but do not continue to perform the task while the patient is being tested. Instruct the patient to place the foot on the ground in a comfortable position and then raise and stomp the foot on the ground 10 times as high and as fast as possible. Rate each side separately, evaluating speed, amplitude, hesitations, halts and decrementing amplitude.',
    parts: [{id: 'R', name: 'Right Leg'}, {id: 'L', name: 'Left Leg'}],
    anc: [
      ['Normal', 'No problems.'],
      ['Slight', 'Any of the following: a) the regular rhythm is broken with one or two interruptions or hesitations of the movement; b) slight slowing; c) amplitude decrements near the end of the task.'],
      ['Mild', 'Any of the following: a) 3 to 5 interruptions during the movements; b) mild slowness; c) amplitude decrements midway in the task.'],
      ['Moderate', 'Any of the following: a) more than 5 interruptions during the movement or at least one longer arrest (freeze) in ongoing movement; b) moderate slowing in speed; c) amplitude decrements after the 1st tap.'],
      ['Severe', 'Cannot or can only barely perform the task because of slowing, interruptions, or decrements.']
    ]
  },
  { id: '3.9', phase: 4, ph: 'Standing & Gait', name: 'Arising from Chair',
    admin: 'Have the patient sit in a straight-backed chair with arms, with both feet on the floor and sitting back in the chair (if the patient is not too short). Ask the patient to cross his/her arms across the chest and then to stand up. If the patient is not successful, repeat this attempt up to a maximum of two more times. If still unsuccessful, allow the patient to move forward in the chair to arise with arms folded across the chest. Allow only one attempt in this situation. If unsuccessful, allow the patient to push off using his/her hands on the arms of the chair. Allow a maximum of three trials of pushing off. If still not successful, assist the patient to arise. After the patient stands up, observe the posture for item 3.13.',
    parts: [{id: 'Single', name: 'Score'}],
    anc: [
      ['Normal', 'No problems. Able to arise quickly without hesitation.'],
      ['Slight', 'Arising is slower than normal; or may need more than one attempt; or may need to move forward in the chair to arise. No need to use the arms of the chair.'],
      ['Mild', 'Pushes self up from the arms of the chair without difficulty.'],
      ['Moderate', 'Needs to push off, but tends to fall back; or may have to try more than one time using the arms of the chair, but can get up without help.'],
      ['Severe', 'Unable to arise without help.']
    ]
  },
  { id: '3.10', phase: 4, ph: 'Standing & Gait', name: 'Gait',
    admin: 'Testing gait is best performed by having the patient walking away from and towards the examiner so that both right and left sides of the body can be easily observed simultaneously. The patient should walk at least 10 meters (30 feet), then turn around and return to the examiner. This item measures multiple behaviors: stride amplitude, stride speed, height of foot lift, heel strike during walking, turning, and arm swing, but not freezing. Assess also for “freezing of gait” (next item 3.11) while patient is walking. Observe posture for item 3.13.',
    parts: [{id: 'Single', name: 'Score'}],
    anc: [
      ['Normal', 'No problems.'],
      ['Slight', 'Independent walking with minor gait impairment.'],
      ['Mild', 'Independent walking but with substantial gait impairment.'],
      ['Moderate', 'Requires an assistance device for safe walking (walking stick, walker) but not a person.'],
      ['Severe', 'Cannot walk at all or only with another person’s assistance.']
    ]
  },
  { id: '3.11', phase: 4, ph: 'Standing & Gait', name: 'Freezing of Gait',
    admin: 'While assessing gait, also assess for the presence of any gait freezing episodes. Observe for start hesitation and stuttering movements especially when turning and reaching the end of the task. To the extent that safety permits, patients may NOT use sensory tricks during the assessment.',
    parts: [{id: 'Single', name: 'Score'}],
    anc: [
      ['Normal', 'No freezing.'],
      ['Slight', 'Freezes on starting, turning, or walking through doorway with a single halt during any of these events, but then continues smoothly without freezing during straight walking.'],
      ['Mild', 'Freezes on starting, turning, or walking through doorway with more than one halt during any of these activities, but continues smoothly without freezing during straight walking.'],
      ['Moderate', 'Freezes once during straight walking.'],
      ['Severe', 'Freezes multiple times during straight walking.']
    ]
  },
  { id: '3.12', phase: 4, ph: 'Standing & Gait', name: 'Postural Stability',

// STATE
let scores = {};
let curView = 'welcome';
let activeTabs = {};

// CALCULATIONS
function getTotalScore() {
  let tot = 0;
  ITEMS.forEach(item => {
    if(item.phase === 7) return;
    item.parts.forEach(p => {
      const v = scores[`${item.id}_${p.id}`];
      if (v !== undefined) tot += v;
    });
  });
  return tot;
}
function getScoredParts() {
  let count = 0, total = 0;
  ITEMS.forEach(item => {
    item.parts.forEach(p => {
      total++;
      if(scores[`${item.id}_${p.id}`] !== undefined) count++;
    });
  });
  return {count, total};
}

// UI RENDERING
function renderSidebar() {
  let h = `<div class="nav-item ${curView==='welcome'?'active':''}" onclick="go('welcome')">
            <div class="nav-dot"></div><div class="nav-name">Overview</div>
           </div>`;
  let lastPh = 0;
  ITEMS.forEach(item => {
    if(item.phase !== lastPh) {
      h += `<div class="nav-phase">Phase ${item.phase}: ${item.ph}</div>`;
      lastPh = item.phase;
    }
    const isDone = item.parts.every(p => scores[`${item.id}_${p.id}`] !== undefined);
    const isAct = curView === `item-${item.id}`;
    h += `<div class="nav-item ${isAct?'active':''} ${isDone?'done':''}" onclick="go('item-${item.id}')">
            <div class="nav-dot"></div>
            <div class="nav-code">${item.id.replace(/DYS|HY/,'')}</div>
            <div class="nav-name">${item.name}</div>
          </div>`;
  });
  h += `<div class="nav-item ${curView==='summary'?'active':''}" onclick="go('summary')" style="margin-top:12px; border-top:1px solid rgba(255,255,255,.1); padding-top:16px;">
          <div class="nav-dot"></div><div class="nav-name" style="font-weight:700;">📋 Review & Summary</div>
        </div>`;
  document.getElementById('nav').innerHTML = h;

  const st = getScoredParts();
  document.getElementById('progCount').innerText = `${st.count} / ${st.total} rated`;
  document.getElementById('progBar').style.width = (st.count/st.total*100)+'%';
  document.getElementById('sbTotal').innerText = getTotalScore();
}

function go(view) {
  curView = view;
  const el = document.getElementById('content');
  el.scrollTop = 0; 

  if(view === 'welcome') {
    document.getElementById('topBadge').innerText = 'Overview';
    document.getElementById('topTitle').innerText = 'Administration Guide';
    el.innerHTML = getWelcomeHTML();
  } else if(view === 'summary') {
    document.getElementById('topBadge').innerText = 'Complete';
    document.getElementById('topTitle').innerText = 'Review & Summary';
    el.innerHTML = getSummaryHTML();
  } else if(view.startsWith('item-')) {
    const id = view.replace('item-', '');
    const item = ITEMS.find(i => i.id === id);
    if(item) {
      document.getElementById('topBadge').innerText = `Phase ${item.phase} · ${item.ph}`;
      document.getElementById('topTitle').innerText = `${item.id.replace(/DYS|HY/,'')} ${item.name}`;
      if(!activeTabs[item.id]) activeTabs[item.id] = item.parts[0].id;
      renderItem(item, el);
    }
  }
  renderSidebar();
}

function getWelcomeHTML() {
  return `
    <div class="hero">
      <div class="hero-h">MDS-UPDRS Part III Scorer</div>
      <div class="hero-p">This tablet-optimized interface allows you to rate all motor examination items precisely according to the manual. Make sure to fill out the patient's medication status in the bottom left sidebar before beginning.</div>
    </div>
    <div class="admin-box">
      <strong>📋 Opening Instruction to Patient:</strong><br><br>
      "I am going to ask you to perform several movements — some will involve your hands, some your legs, and some your balance. Please follow my instructions and try to perform the movements as quickly and as largely as possible unless I tell you otherwise."
    </div>
    <button class="nav-btn nav-btn-n" style="max-width:300px; font-size:18px;" onclick="go('item-3.1')">Begin Examination →</button>
  `;
}

function renderItem(item, container) {
  const actPartId = activeTabs[item.id];
  const actPart = item.parts.find(p => p.id === actPartId);
  const anchors = actPart.anc || item.anc;

  let tabsHTML = '';
  if(item.parts.length > 1) {
    tabsHTML = `<div class="part-tabs">` + item.parts.map(p => {
      const isScored = scores[`${item.id}_${p.id}`] !== undefined;
      const isAct = p.id === actPartId;
      const cls = `part-tab ${isAct ? 'active' : ''} ${isScored ? 'scored' : ''}`;
      return `<button class="${cls}" onclick="switchTab('${item.id}', '${p.id}')">
                ${p.name} ${isScored ? '✓' : ''}
              </button>`;
    }).join('') + `</div>`;
  }

  let cardsHTML = `<div class="score-list">`;
  anchors.forEach((ancData, index) => {
    const val = item.id === 'HY' ? index : (item.id === 'DYS' ? index : index);
    const currentVal = scores[`${item.id}_${actPart.id}`];
    const isSel = currentVal === val;
    const valLabel = item.id === 'HY' ? index : (item.id === 'DYS' ? (index===0?'0':'1') : index);

    cardsHTML += `
      <div class="s-card ${isSel ? 'selected' : ''}" onclick="setScore('${item.id}', '${actPart.id}', ${val})">
        <div class="sc-num">${valLabel}</div>
        <div class="sc-body">
          <div class="sc-title">${ancData[0]}</div>
          <div class="sc-desc">${ancData[1]}</div>
        </div>
      </div>
    `;
  });
  cardsHTML += `</div>`;

  const idx = ITEMS.findIndex(i => i.id === item.id);
  const prev = idx > 0 ? ITEMS[idx-1] : null;
  const next = idx < ITEMS.length-1 ? ITEMS[idx+1] : null;

  let nextBtnText = next ? `Next: ${next.name} →` : `📋 Review & Summary →`;
  let nextBtnAction = next ? `go('item-${next.id}')` : `go('summary')`;

  const unscoredPart = item.parts.find(p => scores[`${item.id}_${p.id}`] === undefined);
  if (unscoredPart && unscoredPart.id !== actPartId) {
    nextBtnText = `Rate ${unscoredPart.name} →`;
    nextBtnAction = `switchTab('${item.id}', '${unscoredPart.id}')`;
  }

  container.innerHTML = `
    <div class="admin-box">
      <strong>Instructions to examiner:</strong><br>
      ${item.admin.replace(/\n\n/g, '<br><br>')}
    </div>
    ${tabsHTML}
    ${cardsHTML}
    <div class="nav-btns">
      <button class="nav-btn nav-btn-p" onclick="go('${prev ? 'item-'+prev.id : 'welcome'}')">← Back</button>
      <button class="nav-btn nav-btn-n" onclick="${nextBtnAction}">${nextBtnText}</button>
    </div>
  `;
}

function switchTab(itemId, partId) {
  activeTabs[itemId] = partId;
  renderItem(ITEMS.find(i => i.id === itemId), document.getElementById('content'));
}

function setScore(itemId, partId, val) {
  scores[`${itemId}_${partId}`] = val;
  const item = ITEMS.find(i => i.id === itemId);
  const nextPart = item.parts.find(p => scores[`${itemId}_${p.id}`] === undefined);
  
  if (nextPart) { activeTabs[itemId] = nextPart.id; }
  
  renderItem(item, document.getElementById('content'));
  renderSidebar();
}

function getSummaryHTML() {
  let h = `
    <div class="sum-grid">
      <div class="stat-card"><div class="stat-lbl">Motor Total Score</div><div class="stat-val">${getTotalScore()}</div></div>
      <div class="stat-card"><div class="stat-lbl">Hoehn & Yahr Stage</div><div class="stat-val" style="color:#d97706">${scores['HY_Stage']!==undefined ? scores['HY_Stage'] : '—'}</div></div>
    </div>
    <div style="overflow-x:auto;">
      <table class="rev-tbl">
        <thead>
          <tr><th>Item</th><th>Assessment Part</th><th>Score</th></tr>
        </thead>
        <tbody>
  `;

  ITEMS.forEach(item => {
    item.parts.forEach(p => {
      const v = scores[`${item.id}_${p.id}`];
      let displayVal = v !== undefined ? v : '—';
      if(item.id === 'DYS') displayVal = v===0 ? '0 (No)' : (v===1 ? '1 (Yes)' : '—');

      h += `
        <tr style="cursor:pointer;" onclick="go('item-${item.id}')">
          <td style="font-weight:600; width:35%">${item.id.replace(/DYS|HY/,'')} ${item.name}</td>
          <td>${p.name !== 'Score' ? p.name : ''}</td>
          <td><span class="tag ${v===undefined?'miss':''}">${v===undefined ? 'Missing' : displayVal}</span></td>
        </tr>
      `;
    });
  });

  h += `
        </tbody>
        <tfoot>
          <tr class="tot-row"><td colspan="2" style="text-align:right;">TOTAL MOTOR SCORE</td><td>${getTotalScore()}</td></tr>
        </tfoot>
      </table>
    </div>
  `;
  return h;
}

function exportExcel() {
  const wb = XLSX.utils.book_new();
  const pt = document.getElementById('mPatient').value || 'Unknown';
  const researcher = document.getElementById('mResearcher').value || 'Unknown';
  const medState = document.getElementById('mState').value || 'N/A';
  
  const rawDose = document.getElementById('mLastDose').value;
  // Format the date string properly if it exists
  const lastDose = rawDose ? new Date(rawDose).toLocaleString() : 'N/A';
  
  const data = [
    ['MDS-UPDRS Part III: Motor Examination'], [],
    ['Patient ID', pt],
    ['Researcher Name', researcher],
    ['Date Examined', new Date().toLocaleDateString()],
    ['Time Examined', new Date().toLocaleTimeString()],
    ['Medication State', medState],
    ['Last Dose Taken', lastDose],
    [],
    ['Item', 'Name', 'Sub-Part', 'Score']
  ];

  ITEMS.forEach(item => {
    item.parts.forEach(p => {
      let v = scores[`${item.id}_${p.id}`];
      if(item.id==='DYS' && v!==undefined) v = v===0?'No':'Yes';
      data.push([item.id, item.name, p.name, v!==undefined?v:'']);
    });
  });
  
  data.push([]);
  data.push(['','TOTAL MOTOR SCORE','', getTotalScore()]);

  const ws = XLSX.utils.aoa_to_sheet(data);
  ws['!cols'] = [{wch:10}, {wch:35}, {wch:30}, {wch:12}];
  XLSX.utils.book_append_sheet(wb, ws, 'Results');
  XLSX.writeFile(wb, `UPDRS_${pt}_${new Date().toISOString().slice(0,10)}.xlsx`);
}

go('welcome');
</script>
