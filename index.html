<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MDS-UPDRS Part III · Motor Examination</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --navy: #0f172a; --navy-2: #1e293b; --navy-3: #334155;
  --slate: #475569; --muted: #94a3b8; --border: #e2e8f0;
  --bg: #f8fafc; --white: #ffffff;
  --blue: #2563eb; --blue-light: #dbeafe;
  --green: #16a34a; --green-light: #dcfce7;
  --amber: #d97706; --amber-light: #fef3c7;
  --red: #dc2626; --red-light: #fee2e2;
  --purple: #7c3aed; --purple-light: #ede9fe;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--navy);min-height:100vh;}
.app-shell{display:flex;height:100vh;overflow:hidden;}

/* SIDEBAR */
.sidebar{width:272px;min-width:272px;background:var(--navy);display:flex;flex-direction:column;overflow:hidden;}
.sidebar-header{padding:22px 18px 14px;border-bottom:1px solid rgba(255,255,255,0.08);}
.sidebar-logo{font-family:'Playfair Display',serif;color:#fff;font-size:15px;font-weight:700;line-height:1.3;margin-bottom:3px;}
.sidebar-sub{color:var(--muted);font-size:10px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;}
.sidebar-progress{padding:14px 18px;border-bottom:1px solid rgba(255,255,255,0.08);}
.prog-label{color:var(--muted);font-size:10px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:6px;}
.prog-bg{background:rgba(255,255,255,0.1);border-radius:99px;height:3px;margin-bottom:5px;}
.prog-fill{background:linear-gradient(90deg,#3b82f6,#60a5fa);border-radius:99px;height:3px;transition:width .4s ease;}
.prog-text{color:rgba(255,255,255,0.4);font-size:11px;font-family:'DM Mono',monospace;}
.score-pill{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:9px 12px;margin-top:7px;display:flex;justify-content:space-between;align-items:center;}
.score-pill-label{color:var(--muted);font-size:11px;}
.score-pill-val{color:#fff;font-family:'DM Mono',monospace;font-size:20px;font-weight:500;}
.nav-scroll{overflow-y:auto;flex:1;padding:6px 0;}
.nav-phase{padding:9px 18px 3px;color:rgba(255,255,255,0.28);font-size:9px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;}
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 18px;cursor:pointer;transition:all .15s;border-left:3px solid transparent;}
.nav-item:hover{background:rgba(255,255,255,0.05);}
.nav-item.active{background:rgba(59,130,246,0.15);border-left-color:#3b82f6;}
.nav-item.done .nav-dot{background:var(--green)!important;}
.nav-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.18);flex-shrink:0;transition:background .2s;}
.nav-item.active .nav-dot{background:#3b82f6;}
.nav-item-inner{flex:1;}
.nav-code{color:rgba(255,255,255,0.28);font-size:9px;font-family:'DM Mono',monospace;}
.nav-item.active .nav-code{color:#93c5fd;}
.nav-name{color:rgba(255,255,255,0.55);font-size:12px;line-height:1.3;}
.nav-item.active .nav-name{color:#fff;font-weight:500;}
.sidebar-foot{padding:12px 18px;border-top:1px solid rgba(255,255,255,0.08);}
.meta-f{margin-bottom:7px;}
.meta-f label{display:block;color:var(--muted);font-size:9px;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;margin-bottom:3px;}
.meta-inp{width:100%;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:5px;padding:5px 9px;color:#fff;font-size:12px;font-family:'DM Sans',sans-serif;outline:none;}
.meta-inp:focus{border-color:rgba(59,130,246,0.5);}
.meta-sel{width:100%;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:5px;padding:5px 9px;color:#fff;font-size:12px;font-family:'DM Sans',sans-serif;outline:none;cursor:pointer;}
.meta-sel option{background:var(--navy-2);color:#fff;}
.meta-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-left{display:flex;align-items:center;gap:14px;}
.phase-badge{background:var(--blue-light);color:var(--blue);padding:3px 11px;border-radius:99px;font-size:10px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;}
.top-title{font-size:15px;font-weight:600;color:var(--navy);}
.topbar-right{display:flex;align-items:center;gap:8px;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;border:none;transition:all .15s;font-family:'DM Sans',sans-serif;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--slate);}
.btn-outline:hover{background:var(--bg);}
.btn-primary{background:var(--blue);color:#fff;}
.btn-primary:hover{background:#1d4ed8;}
.btn-green{background:var(--green);color:#fff;}
.btn-green:hover{background:#15803d;}
.content{flex:1;overflow-y:auto;padding:24px;}

/* ITEM LAYOUT */
.item-wrap{max-width:780px;}
.item-card{background:#fff;border:2px solid var(--border);border-radius:13px;margin-bottom:20px;overflow:hidden;transition:border-color .2s;}
.item-card.scored{border-color:#86efac;}
.item-head{display:flex;border-bottom:1px solid var(--border);}
.item-code{background:var(--navy);color:#fff;padding:12px 14px;font-family:'DM Mono',monospace;font-size:14px;font-weight:500;display:flex;align-items:center;min-width:64px;justify-content:center;}
.item-title-area{flex:1;padding:11px 15px;}
.item-name{font-size:14px;font-weight:600;color:var(--navy);}
.item-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.bil-tag{background:var(--purple-light);color:var(--purple);padding:2px 7px;border-radius:99px;font-size:9px;font-weight:700;margin-top:3px;display:inline-block;letter-spacing:.04em;}
.item-score-box{padding:11px 15px;border-left:1px solid var(--border);display:flex;flex-direction:column;align-items:flex-end;justify-content:center;gap:3px;min-width:80px;}
.chip{background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:2px 8px;font-family:'DM Mono',monospace;font-size:12px;color:var(--slate);}
.chip.set{background:var(--green-light);border-color:#86efac;color:var(--green);font-weight:600;}
.item-body{padding:18px;}

/* INSTRUCTION BOXES */
.say-box{background:#eff6ff;border:1px solid #bfdbfe;border-left:4px solid var(--blue);border-radius:7px;padding:11px 14px;margin-bottom:14px;}
.say-lbl{font-size:9px;font-weight:700;color:var(--blue);letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px;}
.say-txt{font-size:12px;color:#1e40af;font-style:italic;line-height:1.55;}
.admin-box{background:#fffbeb;border:1px solid #fde68a;border-radius:7px;padding:9px 13px;margin-bottom:14px;font-size:12px;color:#92400e;line-height:1.55;}

/* SCORING — big inline with anchors under */
.scoring-section{margin-top:4px;}
.side-label{font-size:10px;font-weight:700;color:var(--slate);letter-spacing:.07em;text-transform:uppercase;margin-bottom:8px;}
.side-label.L{color:#7c3aed;} .side-label.R{color:#0369a1;}
.bilateral-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:4px;}

.score-options{display:flex;gap:6px;margin-bottom:2px;}
.score-opt{flex:1;border:2px solid var(--border);border-radius:9px;padding:8px 4px 6px;cursor:pointer;background:#fff;transition:all .15s;text-align:center;font-family:'DM Sans',sans-serif;}
.score-opt:hover{border-color:#93c5fd;background:#f0f9ff;}
.score-opt .s-num{font-size:20px;font-weight:700;font-family:'DM Mono',monospace;color:var(--navy-3);line-height:1;}
.score-opt .s-word{font-size:9px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin:2px 0 4px;}
.score-opt .s-anchor{font-size:10px;color:#94a3b8;line-height:1.35;font-style:italic;}

/* selected states */
.score-opt.sel-0{border-color:#86efac;background:#f0fdf4;} .score-opt.sel-0 .s-num{color:#16a34a;} .score-opt.sel-0 .s-word{color:#16a34a;} .score-opt.sel-0 .s-anchor{color:#4ade80;}
.score-opt.sel-1{border-color:#fde68a;background:#fffbeb;} .score-opt.sel-1 .s-num{color:#92400e;} .score-opt.sel-1 .s-word{color:#92400e;} .score-opt.sel-1 .s-anchor{color:#d97706;}
.score-opt.sel-2{border-color:#fed7aa;background:#fff7ed;} .score-opt.sel-2 .s-num{color:#c2410c;} .score-opt.sel-2 .s-word{color:#c2410c;} .score-opt.sel-2 .s-anchor{color:#f97316;}
.score-opt.sel-3{border-color:#fca5a5;background:#fff1f2;} .score-opt.sel-3 .s-num{color:#dc2626;} .score-opt.sel-3 .s-word{color:#dc2626;} .score-opt.sel-3 .s-anchor{color:#ef4444;}
.score-opt.sel-4{border-color:#f87171;background:#fef2f2;} .score-opt.sel-4 .s-num{color:#991b1b;} .score-opt.sel-4 .s-word{color:#991b1b;} .score-opt.sel-4 .s-anchor{color:#dc2626;}

/* UR button */
.ur-row{display:flex;justify-content:flex-end;margin-top:6px;}
.ur-btn{font-size:11px;padding:4px 10px;border-radius:5px;cursor:pointer;border:1px dashed var(--muted);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;transition:all .15s;}
.ur-btn:hover{background:var(--bg);border-color:var(--slate);color:var(--slate);}
.ur-btn.ur-active{background:#faf5ff;border-color:var(--purple);color:var(--purple);font-weight:600;}

.notes-area{margin-top:14px;}
.notes-inp{width:100%;border:1px solid var(--border);border-radius:7px;padding:7px 11px;font-size:12px;font-family:'DM Sans',sans-serif;color:var(--navy);outline:none;resize:none;background:#fff;transition:border-color .2s;}
.notes-inp:focus{border-color:var(--blue);}

/* NAV BUTTONS */
.nav-btns{display:flex;align-items:center;justify-content:space-between;margin-top:6px;}

/* WELCOME */
.welcome{max-width:700px;}
.w-hero{background:linear-gradient(135deg,var(--navy) 0%,#1e3a5f 100%);border-radius:14px;padding:36px;margin-bottom:20px;color:#fff;}
.w-eye{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#93c5fd;margin-bottom:10px;}
.w-title{font-family:'Playfair Display',serif;font-size:30px;font-weight:700;line-height:1.2;margin-bottom:10px;}
.w-desc{color:#cbd5e1;font-size:13px;line-height:1.7;}
.w-scale{display:flex;gap:7px;margin-top:20px;}
.w-sc{flex:1;background:rgba(255,255,255,0.07);border-radius:7px;padding:9px 6px;text-align:center;}
.w-sc .n{font-size:18px;font-weight:700;font-family:'DM Mono',monospace;}
.w-sc .l{font-size:9px;color:rgba(255,255,255,0.5);margin-top:1px;}
.opening-box{background:#eff6ff;border:1px solid #bfdbfe;border-left:4px solid var(--blue);border-radius:9px;padding:14px 16px;margin-bottom:20px;}
.opening-lbl{font-size:9px;font-weight:700;color:var(--blue);letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px;}
.opening-txt{font-size:13px;color:#1e40af;font-style:italic;line-height:1.6;}
.phase-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.phase-card{background:#fff;border:1px solid var(--border);border-radius:9px;padding:12px 14px;display:flex;align-items:flex-start;gap:10px;}
.phase-num{background:var(--navy);color:#fff;border-radius:6px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.phase-card-title{font-size:12px;font-weight:600;color:var(--navy);}
.phase-card-sub{font-size:11px;color:var(--muted);margin-top:1px;}

/* SUMMARY */
.sum-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;margin-bottom:18px;}
.sum-card{background:#fff;border:1px solid var(--border);border-radius:9px;padding:13px;}
.sum-card-label{font-size:10px;color:var(--muted);font-weight:500;margin-bottom:1px;}
.sum-card-val{font-size:26px;font-family:'DM Mono',monospace;font-weight:500;color:var(--navy);}
.sum-card-sub{font-size:11px;color:var(--slate);margin-top:1px;}
.rev-table{width:100%;border-collapse:collapse;font-size:12px;}
.rev-table th{background:var(--bg);padding:9px 12px;font-size:10px;font-weight:600;color:var(--slate);text-align:left;letter-spacing:.04em;text-transform:uppercase;border-bottom:2px solid var(--border);}
.rev-table td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
.rev-table tr:hover td{background:var(--bg);}
.rev-inp{background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:3px 7px;font-family:'DM Mono',monospace;font-size:12px;width:50px;text-align:center;outline:none;transition:border-color .2s;}
.rev-inp:focus{border-color:var(--blue);background:#fff;}
.stag{display:inline-block;padding:2px 7px;border-radius:99px;font-size:10px;font-weight:600;font-family:'DM Mono',monospace;}
.s0{background:var(--green-light);color:var(--green);} .s1{background:var(--amber-light);color:var(--amber);} .s2{background:#ffedd5;color:#c2410c;} .s3{background:var(--red-light);color:var(--red);} .s4{background:#fecaca;color:#991b1b;} .sx{background:var(--bg);color:var(--muted);}

/* DYSKINESIA / H&Y section */
.end-card{background:#fff;border:1px solid var(--border);border-radius:13px;padding:18px;margin-bottom:20px;}
.end-title{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:14px;text-transform:uppercase;letter-spacing:.04em;}
.radio-row{display:flex;gap:16px;align-items:center;margin-bottom:10px;}
.radio-label{font-size:13px;color:var(--navy-3);}
.radio-opt{display:flex;align-items:center;gap:5px;cursor:pointer;font-size:13px;color:var(--slate);}
.radio-opt input{cursor:pointer;}
.hy-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:6px;}
.hy-opt{border:2px solid var(--border);border-radius:8px;padding:10px 10px 8px;cursor:pointer;background:#fff;transition:all .15s;}
.hy-opt:hover{border-color:#93c5fd;background:#f0f9ff;}
.hy-opt.sel{border-color:var(--blue);background:var(--blue-light);}
.hy-num{font-size:18px;font-weight:700;font-family:'DM Mono',monospace;color:var(--navy-3);}
.hy-opt.sel .hy-num{color:var(--blue);}
.hy-desc{font-size:10px;color:var(--muted);line-height:1.35;margin-top:3px;}
.hy-opt.sel .hy-desc{color:#1e40af;}

::-webkit-scrollbar{width:5px;} ::-webkit-scrollbar-track{background:transparent;} ::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:99px;}
.fade-in{animation:fi .22s ease;} @keyframes fi{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
@media(max-width:700px){.sidebar{display:none;} .bilateral-grid{grid-template-columns:1fr;} .phase-grid{grid-template-columns:1fr;} .hy-grid{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>
<div class="app-shell">

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">MDS-UPDRS<br>Part III</div>
    <div class="sidebar-sub">Motor Examination</div>
  </div>
  <div class="sidebar-progress">
    <div class="prog-label">Progress</div>
    <div class="prog-bg"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    <div class="prog-text" id="progText">0 / 18 items scored</div>
    <div class="score-pill">
      <span class="score-pill-label">Total Score</span>
      <span class="score-pill-val" id="sideTotal">—</span>
    </div>
  </div>
  <nav class="nav-scroll" id="navScroll"></nav>
  <div class="sidebar-foot">
    <div class="meta-f"><label>Patient ID</label><input class="meta-inp" id="mPatient" placeholder="e.g. PD-2024-001"></div>
    <div class="meta-f"><label>Examiner</label><input class="meta-inp" id="mExaminer" placeholder="Name"></div>
    <div class="meta-f">
      <label>On PD medication?</label>
      <select class="meta-sel" id="mOnMeds" onchange="handleMedsChange()">
        <option value="">Select…</option>
        <option value="No">No</option>
        <option value="Yes">Yes</option>
      </select>
    </div>
    <div id="medsDetails" style="display:none">
      <div class="meta-f">
        <label>Clinical State</label>
        <select class="meta-sel" id="mState">
          <option value="">Select…</option>
          <option value="ON">ON — Good response to medication</option>
          <option value="OFF">OFF — Poor response to medication</option>
        </select>
      </div>
      <div class="meta-f">
        <label>On Levodopa?</label>
        <select class="meta-sel" id="mLevodopa" onchange="handleLevodopaChange()">
          <option value="">Select…</option>
          <option value="No">No</option>
          <option value="Yes">Yes</option>
        </select>
      </div>
      <div id="levodopaDetails" style="display:none">
        <div class="meta-f"><label>Last Levodopa Dose</label><input class="meta-inp" id="mLastDose" type="datetime-local"></div>
      </div>
    </div>
  </div>
</aside>

<!-- MAIN -->
<main class="main">
  <header class="topbar">
    <div class="topbar-left">
      <span class="phase-badge" id="topBadge">Welcome</span>
      <span class="top-title" id="topTitle">MDS-UPDRS Part III Scorer</span>
    </div>
    <div class="topbar-right">
      <button class="btn btn-outline" onclick="showView('summary')">📋 Review & Edit</button>
      <button class="btn btn-green" onclick="exportExcel()">⬇ Export Excel</button>
    </div>
  </header>
  <div class="content" id="mainContent"></div>
</main>
</div>

<script>
// ===== ITEMS DATA (Official MDS-UPDRS language) =====
const ITEMS = [
{id:'3.1',phase:1,phaseName:'Observation & Speech',name:'Speech',bilateral:false,
 examinerNote:'Listen to the patient\'s free-flowing speech and engage in conversation if necessary. Suggested topics: ask about the patient\'s work, hobbies, exercise, or how he got to the doctor\'s office. Evaluate volume, modulation (prosody), and clarity, including slurring, palilalia (repetition of syllables), and tachyphemia (rapid speech, running syllables together).',
 say:'Tell me about your work, hobbies, or how you got here today.',
 anchors:[[0,'Normal','No speech problems.'],[1,'Slight','Loss of modulation, diction, or volume, but still all words easy to understand.'],[2,'Mild','Loss of modulation, diction, or volume, with a few words unclear, but the overall sentences easy to follow.'],[3,'Moderate','Speech is difficult to understand to the point that some, but not most, sentences are poorly understood.'],[4,'Severe','Most speech is difficult to understand or unintelligible.']]},

{id:'3.2',phase:1,phaseName:'Observation & Speech',name:'Facial Expression',bilateral:false,
 examinerNote:'Observe the patient sitting at rest for 10 seconds, without talking and also while talking. Observe eye-blink frequency, masked facies or loss of facial expression, spontaneous smiling, and parting of lips.',
 say:null,
 anchors:[[0,'Normal','Normal facial expression.'],[1,'Slight','Minimal masked facies manifested only by decreased frequency of blinking.'],[2,'Mild','In addition to decreased eye-blink frequency, masked facies present in the lower face as well, namely fewer movements around the mouth, such as less spontaneous smiling, but lips not parted.'],[3,'Moderate','Masked facies with lips parted some of the time when the mouth is at rest.'],[4,'Severe','Masked facies with lips parted most of the time when the mouth is at rest.']]},

{id:'3.3',phase:2,phaseName:'Rigidity',name:'Rigidity',bilateral:true,bilateralParts:['Neck','RUE','LUE','RLE','LLE'],
 examinerNote:'Rigidity is judged on slow passive movement of major joints with the patient in a relaxed position and the examiner manipulating the limbs and neck. First, test without an activation maneuver. Test and rate neck and each limb separately. For arms, test the wrist and elbow joints simultaneously. For legs, test the hip and knee joints simultaneously. If no rigidity is detected, use an activation maneuver such as tapping fingers, fist opening/closing, or heel tapping in a limb not being tested. Explain to the patient to go as limp as possible as you test for rigidity.',
 say:'Please go as limp as possible as I move your limbs. Try not to help me or resist.',
 anchors:[[0,'Normal','No rigidity.'],[1,'Slight','Rigidity only detected with activation maneuver.'],[2,'Mild','Rigidity detected without the activation maneuver, but full range of motion is easily achieved.'],[3,'Moderate','Rigidity detected without the activation maneuver; full range of motion is achieved with effort.'],[4,'Severe','Rigidity detected without the activation maneuver and full range of motion not achieved.']]},

{id:'3.4',phase:3,phaseName:'Motor Tasks',name:'Finger Tapping',bilateral:true,
 examinerNote:'Each hand is tested separately. Demonstrate the task, but do not continue to perform the task while the patient is being tested. Instruct the patient to tap the index finger on the thumb 10 times as quickly AND as big as possible. Rate each side separately, evaluating speed, amplitude, hesitations, halts, and decrementing amplitude.',
 say:'[Demonstrate] Tap your index finger on your thumb 10 times as quickly AND as big as possible.',

// State
let scores = {}; // key: '3.1', '3.3_Neck', '3.3_RUE', '3.4_R', '3.4_L', etc.
let urFlags = {}; // keys set to true if Unable to Rate
let itemNotes = {};
let dysk = {present:'', interfered:''};
let hyStage = null;
let currentView = 'welcome';

// ===== HELPERS =====
function getScoreKey(item, side) {
  if (!item.bilateral) return item.id;
  return item.id + '_' + side;
}

function getBilateralSides(item) {
  if (item.bilateralParts) return item.bilateralParts;
  return ['R','L'];
}

function isItemScored(item) {
  if (item.bilateral) {
    const sides = getBilateralSides(item);
    return sides.every(s => scores[getScoreKey(item,s)] !== undefined || urFlags[getScoreKey(item,s)]);
  }
  return scores[item.id] !== undefined || urFlags[item.id];
}

function getItemSubtotal(item) {
  if (item.bilateral) {
    const sides = getBilateralSides(item);
    return sides.reduce((t,s) => {
      const k = getScoreKey(item,s);
      return t + (scores[k] !== undefined ? scores[k] : 0);
    }, 0);
  }
  return scores[item.id] !== undefined ? scores[item.id] : 0;
}

function getTotalScore() {
  return ITEMS.reduce((t,item) => t + getItemSubtotal(item), 0);
}
function getScoredCount() { return ITEMS.filter(isItemScored).length; }

function handleMedsChange() {
  const v = document.getElementById('mOnMeds').value;
  document.getElementById('medsDetails').style.display = v === 'Yes' ? 'block' : 'none';
}
function handleLevodopaChange() {
  const v = document.getElementById('mLevodopa').value;
  document.getElementById('levodopaDetails').style.display = v === 'Yes' ? 'block' : 'none';
}

function getMinsSinceLastDose() {
  const val = document.getElementById('mLastDose').value;
  if (!val) return null;
  const last = new Date(val);
  const now = new Date();
  return Math.round((now - last) / 60000);
}

// ===== PROGRESS =====
function updateProgress() {
  const n = getScoredCount(), total = ITEMS.length;
  const pct = Math.round(n/total*100);
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progText').textContent = `${n} / ${total} items scored`;
  const ts = getTotalScore();
  document.getElementById('sideTotal').textContent = n > 0 ? ts : '—';
}

// ===== NAV =====
function buildNav() {
  const nav = document.getElementById('navScroll');
  nav.innerHTML = '';
  const makeItem = (label, code, viewId, scored) => {
    const el = document.createElement('div');
    el.className = 'nav-item' + (currentView===viewId?' active':'') + (scored?' done':'');
    el.innerHTML = `<div class="nav-dot"></div><div class="nav-item-inner"><div class="nav-code">${code}</div><div class="nav-name">${label}</div></div>`;
    el.onclick = () => showView(viewId);
    nav.appendChild(el);
  };
  makeItem('Overview','','welcome',false);
  let lastPhase = null;
  ITEMS.forEach(item => {
    if (item.phase !== lastPhase) {
      const ph = document.createElement('div');
      ph.className = 'nav-phase';
      ph.textContent = `Phase ${item.phase} · ${item.phaseName}`;
      nav.appendChild(ph);
      lastPhase = item.phase;
    }
    makeItem(item.name, item.id, 'item-'+item.id, isItemScored(item));
  });
  makeItem('Dyskinesia & H&Y','END','end',false);
  makeItem('Review & Export','','summary',false);
}

// ===== MAIN VIEW ROUTER =====
function showView(viewId) {
  currentView = viewId;
  buildNav();
  const mc = document.getElementById('mainContent');
  mc.innerHTML = '';
  mc.className = 'content fade-in';

  if (viewId==='welcome') {
    document.getElementById('topBadge').textContent='Overview';
    document.getElementById('topTitle').textContent='MDS-UPDRS Part III Scorer';
    mc.appendChild(renderWelcome());
  } else if (viewId==='summary') {
    document.getElementById('topBadge').textContent='Review';
    document.getElementById('topTitle').textContent='Score Summary & Export';
    mc.appendChild(renderSummary());
  } else if (viewId==='end') {
    document.getElementById('topBadge').textContent='End of Exam';
    document.getElementById('topTitle').textContent='Dyskinesia & Hoehn and Yahr';
    mc.appendChild(renderEnd());
  } else if (viewId.startsWith('item-')) {
    const id = viewId.replace('item-','');
    const item = ITEMS.find(i=>i.id===id);
    if (item) {
      document.getElementById('topBadge').textContent=`Phase ${item.phase} · ${item.phaseName}`;
      document.getElementById('topTitle').textContent=`${item.id} · ${item.name}`;
      mc.appendChild(renderItem(item));
    }
  }
  updateProgress();
}

// ===== ITEM VIEW =====
function renderItem(item) {
  const wrap = document.createElement('div');
  wrap.className = 'item-wrap';

  const card = document.createElement('div');
  const scored = isItemScored(item);
  card.className = 'item-card' + (scored?' scored':'');
  card.id = 'card-' + item.id.replace('.','_');

  // Header
  const sides = item.bilateral ? getBilateralSides(item) : [];
  let scorePreview = '';
  if (item.bilateral) {
    scorePreview = sides.map(s => {
      const k = getScoreKey(item,s);
      const v = urFlags[k] ? 'UR' : (scores[k] !== undefined ? scores[k] : '—');
      const isSet = scores[k]!==undefined || urFlags[k];
      return `<span class="chip ${isSet?'set'}">${s}: ${v}</span>`;
    }).join('');
  } else {
    const k = item.id;
    const v = urFlags[k] ? 'UR' : (scores[k] !== undefined ? scores[k] : '—');
    const isSet = scores[k]!==undefined || urFlags[k];
    scorePreview = `<span class="chip ${isSet?'set'}">${v}</span>`;
  }

  card.innerHTML = `
    <div class="item-head">
      <div class="item-code">${item.id}</div>
      <div class="item-title-area">
        <div class="item-name">${item.name.toUpperCase()}</div>
        ${item.bilateral ? `<span class="bil-tag">Score separately: ${getBilateralSides(item).join(' · ')}</span>` : '<div class="item-sub">Single score</div>'}
      </div>
      <div class="item-score-box">${scorePreview}</div>
    </div>
    <div class="item-body" id="body-${item.id.replace('.','_')}"></div>
  `;

  const body = card.querySelector(`#body-${item.id.replace('.','_')}`);

  // Examiner note
  if (item.examinerNote) {
    const an = document.createElement('div');
    an.className = 'admin-box';
    an.innerHTML = `<strong>Instructions to examiner:</strong> ${item.examinerNote}`;
    body.appendChild(an);
  }

  // Say box
  if (item.say) {
    const sb = document.createElement('div');
    sb.className = 'say-box';
    sb.innerHTML = `<div class="say-lbl">Instruction to patient</div><div class="say-txt">"${item.say}"</div>`;
    body.appendChild(sb);
  }

  // Scoring
  const scoreSection = document.createElement('div');
  scoreSection.className = 'scoring-section';

  if (item.bilateral) {
    const bg = document.createElement('div');
    bg.className = 'bilateral-grid';
    getBilateralSides(item).forEach(side => {
      const col = document.createElement('div');
      const sl = document.createElement('div');
      sl.className = 'side-label ' + (side==='L'||side==='LUE'||side==='LLE'?'L':'R');
      // map side labels
      const sideDisplay = {R:'▶ RIGHT',L:'◀ LEFT',RUE:'▶ RIGHT UPPER EXTREMITY',LUE:'◀ LEFT UPPER EXTREMITY',RLE:'▶ RIGHT LOWER EXTREMITY',LLE:'◀ LEFT LOWER EXTREMITY',Neck:'↕ NECK','Lip/Jaw':'👄 LIP / JAW'};
      sl.textContent = sideDisplay[side] || side;
      col.appendChild(sl);
      col.appendChild(buildScoreOptions(item, side, card, wrap));
      const urRow = buildUrRow(item, side, card, wrap);
      col.appendChild(urRow);
      bg.appendChild(col);
    });
    scoreSection.appendChild(bg);
  } else {
    scoreSection.appendChild(buildScoreOptions(item, null, card, wrap));
    scoreSection.appendChild(buildUrRow(item, null, card, wrap));
  }
  body.appendChild(scoreSection);

  // Notes
  const notesDiv = document.createElement('div');
  notesDiv.className = 'notes-area';
  const ni = document.createElement('textarea');
  ni.className = 'notes-inp';
  ni.rows = 2;
  ni.placeholder = 'Examiner notes for this item (optional)…';
  ni.value = itemNotes[item.id] || '';
  ni.oninput = () => { itemNotes[item.id] = ni.value; };
  notesDiv.appendChild(ni);
  body.appendChild(notesDiv);

  wrap.appendChild(card);

  // Nav
  const idx = ITEMS.findIndex(i=>i.id===item.id);
  const prev = idx > 0 ? ITEMS[idx-1] : null;
  const next = idx < ITEMS.length-1 ? ITEMS[idx+1] : null;
  const navBtns = document.createElement('div');
  navBtns.className = 'nav-btns';
  navBtns.innerHTML = `
    <button class="btn btn-outline" onclick="showView('${prev?'item-'+prev.id:'welcome'}')">← ${prev ? prev.id+' · '+prev.name.split('(')[0].trim() : 'Overview'}</button>
    <button class="btn btn-primary" onclick="showView('${next?'item-'+next.id:'end'}')">→ ${next ? next.id+' · '+next.name.split('(')[0].trim() : 'Dyskinesia & H&Y'}</button>
  `;
  wrap.appendChild(navBtns);
  return wrap;
}

function buildScoreOptions(item, side, cardEl, wrapEl) {
  const key = side ? getScoreKey(item, side) : item.id;
  const curVal = scores[key];
  const isUR = urFlags[key];
  const words = ['Normal','Slight','Mild','Moderate','Severe'];

  const row = document.createElement('div');
  row.className = 'score-options';

  item.anchors.forEach(([s, lbl, desc]) => {
    const btn = document.createElement('div');
    btn.className = 'score-opt' + (!isUR && curVal===s ? ` sel-${s}` : '');
    btn.innerHTML = `
      <div class="s-num">${s}</div>
      <div class="s-word">${lbl}</div>
      <div class="s-anchor">${desc}</div>
    `;
    btn.onclick = () => {
      scores[key] = s;
      delete urFlags[key];
      refreshItem(item, wrapEl);
    };
    row.appendChild(btn);
  });
  return row;
}

function buildUrRow(item, side, cardEl, wrapEl) {
  const key = side ? getScoreKey(item, side) : item.id;
  const isUR = urFlags[key];
  const row = document.createElement('div');
  row.className = 'ur-row';
  const btn = document.createElement('button');
  btn.className = 'ur-btn' + (isUR ? ' ur-active' : '');
  btn.textContent = isUR ? '✓ Unable to Rate (UR)' : 'Mark as Unable to Rate (UR)';
  btn.onclick = () => {
    if (isUR) { delete urFlags[key]; }
    else { urFlags[key] = true; delete scores[key]; }
    refreshItem(item, wrapEl);
  };
  row.appendChild(btn);
  return row;
}

function refreshItem(item, wrapEl) {
  const newContent = renderItem(item);
  wrapEl.innerHTML = '';
  while (newContent.firstChild) wrapEl.appendChild(newContent.firstChild);
  updateProgress();
  buildNav();
}

// ===== END SECTION (Dyskinesia + H&Y) =====
function renderEnd() {
  const d = document.createElement('div');
  d.style.maxWidth = '700px';

  // Dyskinesia
  const dc = document.createElement('div');
  dc.className = 'end-card';
  dc.innerHTML = `
    <div class="end-title">Dyskinesia Impact on Part III Ratings</div>
    <div class="radio-row">
      <span class="radio-label">A. Were dyskinesias (chorea or dystonia) present during examination?</span>
      <label class="radio-opt"><input type="radio" name="dysk_present" value="No" ${dysk.present==='No'?'checked':''} onchange="dysk.present=this.value"> No</label>
      <label class="radio-opt"><input type="radio" name="dysk_present" value="Yes" ${dysk.present==='Yes'?'checked':''} onchange="dysk.present=this.value"> Yes</label>
    </div>
    <div class="radio-row">
      <span class="radio-label">B. If yes, did these movements interfere with your ratings?</span>
      <label class="radio-opt"><input type="radio" name="dysk_interfere" value="No" ${dysk.interfered==='No'?'checked':''} onchange="dysk.interfered=this.value"> No</label>
      <label class="radio-opt"><input type="radio" name="dysk_interfere" value="Yes" ${dysk.interfered==='Yes'?'checked':''} onchange="dysk.interfered=this.value"> Yes</label>
    </div>
  `;
  d.appendChild(dc);

  // H&Y
  const hy = document.createElement('div');
  hy.className = 'end-card';
  const hyStages = [
    [0,'Asymptomatic.'],
    [1,'Unilateral involvement only.'],
    [2,'Bilateral involvement without impairment of balance.'],
    [3,'Mild to moderate involvement; some postural instability but physically independent; needs assistance to recover from pull test.'],
    [4,'Severe disability; still able to walk or stand unassisted.'],
    [5,'Wheelchair bound or bedridden unless aided.']
  ];
  let hyGrid = '<div class="hy-grid">';
  hyStages.forEach(([s,desc]) => {
    hyGrid += `<div class="hy-opt${hyStage===s?' sel':''}" onclick="hyStage=${s};showView('end')"><div class="hy-num">${s}</div><div class="hy-desc">${desc}</div></div>`;
  });
  hyGrid += '</div>';
  hy.innerHTML = `<div class="end-title">Hoehn and Yahr Stage</div>${hyGrid}`;
  d.appendChild(hy);

  const navBtns = document.createElement('div');
  navBtns.className = 'nav-btns';
  navBtns.innerHTML = `
    <button class="btn btn-outline" onclick="showView('item-3.18')">← 3.18 · Constancy of Rest Tremor</button>
    <button class="btn btn-green" onclick="showView('summary')">📋 Review & Export →</button>
  `;
  d.appendChild(navBtns);
  return d;
}

// ===== SUMMARY =====
function renderSummary() {
  const d = document.createElement('div');
  const n = getScoredCount(), total = ITEMS.length, ts = getTotalScore();

  d.innerHTML = `
    <div class="sum-grid">
      <div class="sum-card"><div class="sum-card-label">Total Score</div><div class="sum-card-val" id="sumTot">${ts}</div><div class="sum-card-sub">/ ${ITEMS.reduce((a,i)=>a+(i.bilateral?getBilateralSides(i).length*4:4),0)} theoretical max</div></div>
      <div class="sum-card"><div class="sum-card-label">Items Scored</div><div class="sum-card-val">${n}/${total}</div><div class="sum-card-sub">${total-n} remaining</div></div>
      <div class="sum-card"><div class="sum-card-label">Patient</div><div class="sum-card-val" style="font-size:15px;margin-top:4px">${document.getElementById('mPatient').value||'—'}</div><div class="sum-card-sub">State: ${document.getElementById('mState')?document.getElementById('mState').value||'—':'—'}</div></div>
      <div class="sum-card"><div class="sum-card-label">H&Y Stage</div><div class="sum-card-val">${hyStage!==null?hyStage:'—'}</div><div class="sum-card-sub">${new Date().toLocaleDateString()}</div></div>
    </div>
  `;

  const card = document.createElement('div');
  card.style.cssText='background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden;';
  const hdr = document.createElement('div');
  hdr.style.cssText='padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;';
  hdr.innerHTML=`<span style="font-size:12px;font-weight:700;color:var(--navy-3);text-transform:uppercase;letter-spacing:.04em">Score Sheet — click any score to edit</span><button class="btn btn-green btn-sm" onclick="exportExcel()">⬇ Export to Excel</button>`;
  card.appendChild(hdr);

  const tbl = document.createElement('table');
  tbl.className = 'rev-table';
  tbl.innerHTML = `<thead><tr><th>Item</th><th>Name</th><th>Scores</th><th>Item Total</th><th>Notes</th></tr></thead>`;
  const tb = document.createElement('tbody');

  ITEMS.forEach(item => {
    const tr = document.createElement('tr');
    let scoresHtml = '';
    if (item.bilateral) {
      getBilateralSides(item).forEach(s => {
        const k = getScoreKey(item,s);
        const v = urFlags[k] ? 'UR' : (scores[k]!==undefined?scores[k]:'');
        scoresHtml += `<div style="display:flex;align-items:center;gap:5px;margin-bottom:3px"><span style="font-size:10px;color:var(--muted);font-weight:600;width:36px">${s}:</span><input class="rev-inp" type="text" value="${v}" placeholder="—" onchange="updateFromTable('${k}',this.value,this)"></div>`;
      });
    } else {
      const v = urFlags[item.id] ? 'UR' : (scores[item.id]!==undefined?scores[item.id]:'');
      scoresHtml = `<input class="rev-inp" type="text" value="${v}" placeholder="—" onchange="updateFromTable('${item.id}',this.value,this)">`;
    }
    const sub = getItemSubtotal(item);
    const isScored = isItemScored(item);
    const subClass = isScored ? `stag s${Math.min(4,sub)}` : 'stag sx';
    tr.innerHTML = `
      <td><strong style="font-family:'DM Mono',monospace;font-size:12px">${item.id}</strong></td>
      <td style="font-size:12px">${item.name}</td>
      <td>${scoresHtml}</td>
      <td><span class="${subClass}">${isScored?sub:'—'}</span></td>
      <td><input style="border:1px solid var(--border);border-radius:5px;padding:3px 7px;font-size:11px;width:120px;outline:none" placeholder="notes…" value="${itemNotes[item.id]||''}" onchange="itemNotes['${item.id}']=this.value"></td>
    `;
    tb.appendChild(tr);
  });

  // Total row
  const totTr = document.createElement('tr');
  totTr.style.background = 'var(--navy)';
  totTr.innerHTML = `<td colspan="3" style="padding:11px 12px;color:#fff;font-weight:700;text-align:right;font-size:13px">TOTAL SCORE</td><td style="padding:11px 12px"><span style="color:#fff;font-family:'DM Mono',monospace;font-size:18px;font-weight:700" id="revTotal">${ts}</span></td><td style="padding:11px 12px;color:var(--muted);font-size:11px">/ ~${ITEMS.reduce((a,i)=>a+(i.bilateral?getBilateralSides(i).length*4:4),0)} max</td>`;
  tb.appendChild(totTr);

  tbl.appendChild(tb);
  const ov = document.createElement('div');
  ov.style.overflowX='auto';
  ov.appendChild(tbl);
  card.appendChild(ov);
  d.appendChild(card);
  return d;
}

function updateFromTable(key, val, el) {
  const v = val.trim().toUpperCase();
  if (v === 'UR') { urFlags[key] = true; delete scores[key]; }
  else {
    const n = parseInt(v);
    if (isNaN(n)||n<0||n>4) { el.value = scores[key]!==undefined?scores[key]:(urFlags[key]?'UR':''); return; }
    scores[key] = n; delete urFlags[key];
  }
  updateProgress(); buildNav();
  const rt = document.getElementById('revTotal'); if (rt) rt.textContent = getTotalScore();
  const st = document.getElementById('sumTot'); if (st) st.textContent = getTotalScore();
}

// ===== EXCEL EXPORT =====
function exportExcel() {
  const wb = XLSX.utils.book_new();
  const mins = getMinsSinceLastDose();

  const meta = [
    ['MDS-UPDRS PART III · MOTOR EXAMINATION'],[''],
    ['Patient ID', document.getElementById('mPatient').value||''],
    ['Examiner', document.getElementById('mExaminer').value||''],
    ['Date', new Date().toLocaleDateString()],
    ['Time', new Date().toLocaleTimeString()],
    ['On PD Medication', document.getElementById('mOnMeds').value||''],
    ['Clinical State (ON/OFF)', document.getElementById('mState')?document.getElementById('mState').value||'':''],
    ['On Levodopa', document.getElementById('mLevodopa')?document.getElementById('mLevodopa').value||'':''],
    ['Minutes Since Last Levodopa Dose', mins!==null?mins:''],
    ['Dyskinesia Present', dysk.present||''],
    ['Dyskinesia Interfered', dysk.interfered||''],
    ['Hoehn & Yahr Stage', hyStage!==null?hyStage:''],
    [''],['SCORES','','','',''],
    ['Item','Name','Side/Part','Score','UR','Notes']
  ];

  ITEMS.forEach(item => {
    if (item.bilateral) {
      getBilateralSides(item).forEach((s,i) => {
        const k = getScoreKey(item,s);
        meta.push([
          i===0?item.id:'', i===0?item.name:'', s,
          scores[k]!==undefined?scores[k]:'',
          urFlags[k]?'UR':'',
          i===0?(itemNotes[item.id]||''):''
        ]);
      });
    } else {
      meta.push([item.id, item.name, 'N/A', scores[item.id]!==undefined?scores[item.id]:'', urFlags[item.id]?'UR':'', itemNotes[item.id]||'']);
    }
  });
  meta.push(['','','','','','']);
  meta.push(['TOTAL SCORE','','','',getTotalScore(),'']);

  const ws = XLSX.utils.aoa_to_sheet(meta);
  ws['!cols']=[{wch:10},{wch:38},{wch:12},{wch:8},{wch:5},{wch:40}];
  XLSX.utils.book_append_sheet(wb, ws, 'Scores');

  const pat = document.getElementById('mPatient').value||'patient';
  const date = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `UPDRS_III_${pat}_${date}.xlsx`);
}

// ===== INIT =====
showView('welcome');
</script>
