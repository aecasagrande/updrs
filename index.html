<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MDS-UPDRS Part III · Motor Examination</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --navy: #0f172a;
  --navy-2: #1e293b;
  --navy-3: #334155;
  --slate: #475569;
  --muted: #94a3b8;
  --border: #e2e8f0;
  --bg: #f8fafc;
  --white: #ffffff;
  --blue: #2563eb;
  --blue-light: #dbeafe;
  --blue-mid: #93c5fd;
  --green: #16a34a;
  --green-light: #dcfce7;
  --amber: #d97706;
  --amber-light: #fef3c7;
  --red: #dc2626;
  --red-light: #fee2e2;
  --purple: #7c3aed;
  --purple-light: #ede9fe;
  --teal: #0d9488;
  --teal-light: #ccfbf1;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--navy);
  min-height: 100vh;
}

/* ===== LAYOUT ===== */
.app-shell { display: flex; height: 100vh; overflow: hidden; }
.sidebar {
  width: 280px; min-width: 280px;
  background: var(--navy);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 14px 28px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.content { flex: 1; overflow-y: auto; padding: 28px; }

/* ===== SIDEBAR ===== */
.sidebar-header {
  padding: 24px 20px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.sidebar-logo {
  font-family: 'Playfair Display', serif;
  color: var(--white);
  font-size: 15px;
  font-weight: 700;
  line-height: 1.3;
  margin-bottom: 4px;
}
.sidebar-sub { color: var(--muted); font-size: 11px; font-weight: 400; letter-spacing: 0.05em; text-transform: uppercase; }

.sidebar-progress { padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.08); }
.progress-label { color: var(--muted); font-size: 10px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
.progress-bar-bg { background: rgba(255,255,255,0.1); border-radius: 99px; height: 4px; margin-bottom: 6px; }
.progress-bar-fill { background: linear-gradient(90deg, #3b82f6, #60a5fa); border-radius: 99px; height: 4px; transition: width 0.4s ease; }
.progress-text { color: rgba(255,255,255,0.5); font-size: 11px; font-family: 'DM Mono', monospace; }
.total-score-pill {
  background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 8px; padding: 10px 14px; margin-top: 8px;
  display: flex; justify-content: space-between; align-items: center;
}
.total-score-label { color: var(--muted); font-size: 11px; font-weight: 500; }
.total-score-val { color: var(--white); font-family: 'DM Mono', monospace; font-size: 20px; font-weight: 500; }

.nav-section { overflow-y: auto; flex: 1; padding: 8px 0; }
.nav-phase-label {
  padding: 10px 20px 4px;
  color: rgba(255,255,255,0.3);
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 20px;
  cursor: pointer;
  transition: all 0.15s;
  border-left: 3px solid transparent;
}
.nav-item:hover { background: rgba(255,255,255,0.05); }
.nav-item.active { background: rgba(59,130,246,0.15); border-left-color: #3b82f6; }
.nav-item.completed .nav-dot { background: var(--green) !important; }
.nav-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: rgba(255,255,255,0.2);
  flex-shrink: 0; transition: background 0.2s;
}
.nav-item.active .nav-dot { background: #3b82f6; }
.nav-item-text { color: rgba(255,255,255,0.6); font-size: 12px; line-height: 1.3; }
.nav-item.active .nav-item-text { color: var(--white); font-weight: 500; }
.nav-item-code { color: rgba(255,255,255,0.3); font-size: 10px; font-family: 'DM Mono', monospace; }
.nav-item.active .nav-item-code { color: #93c5fd; }

.sidebar-footer { padding: 14px 20px; border-top: 1px solid rgba(255,255,255,0.08); }
.meta-field { margin-bottom: 8px; }
.meta-field label { display: block; color: var(--muted); font-size: 10px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 4px; }
.meta-input {
  width: 100%; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 6px; padding: 6px 10px; color: var(--white); font-size: 12px;
  font-family: 'DM Sans', sans-serif; outline: none; transition: border-color 0.2s;
}
.meta-input:focus { border-color: rgba(59,130,246,0.5); }
.meta-select {
  width: 100%; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 6px; padding: 6px 10px; color: var(--white); font-size: 12px;
  font-family: 'DM Sans', sans-serif; outline: none; cursor: pointer;
}
.meta-select option { background: var(--navy-2); color: var(--white); }

/* ===== TOPBAR ===== */
.topbar-left { display: flex; align-items: center; gap: 16px; }
.phase-badge {
  background: var(--blue-light);
  color: var(--blue);
  padding: 4px 12px; border-radius: 99px;
  font-size: 11px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;
}
.item-title { font-size: 16px; font-weight: 600; color: var(--navy); }
.topbar-right { display: flex; align-items: center; gap: 10px; }
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 500;
  cursor: pointer; border: none; transition: all 0.15s; font-family: 'DM Sans', sans-serif;
}
.btn-outline {
  background: transparent; border: 1px solid var(--border); color: var(--slate);
}
.btn-outline:hover { background: var(--bg); border-color: var(--muted); }
.btn-primary { background: var(--blue); color: var(--white); }
.btn-primary:hover { background: #1d4ed8; }
.btn-green { background: var(--green); color: var(--white); }
.btn-green:hover { background: #15803d; }
.btn-sm { padding: 6px 12px; font-size: 12px; }

/* ===== CONTENT CARDS ===== */
.card { background: var(--white); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 20px; overflow: hidden; }
.card-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.card-title { font-size: 13px; font-weight: 600; color: var(--navy-3); letter-spacing: 0.02em; text-transform: uppercase; }
.card-body { padding: 20px; }

/* ===== ITEM CARD ===== */
.item-card {
  background: var(--white); border: 2px solid var(--border);
  border-radius: 14px; margin-bottom: 24px; overflow: hidden;
  transition: border-color 0.2s;
}
.item-card.scored { border-color: var(--green); }
.item-card.bilateral { border-color: #a855f7; }
.item-card.bilateral.scored { border-color: var(--green); }

.item-header {
  display: flex; align-items: stretch; gap: 0;
  border-bottom: 1px solid var(--border);
}
.item-code-box {
  background: var(--navy); color: var(--white);
  padding: 14px 16px;
  font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 500;
  display: flex; align-items: center; min-width: 70px; justify-content: center;
}
.item-title-area { flex: 1; padding: 12px 16px; }
.item-name { font-size: 15px; font-weight: 600; color: var(--navy); }
.item-subtitle { font-size: 12px; color: var(--muted); margin-top: 2px; }
.bilateral-tag {
  background: var(--purple-light); color: var(--purple);
  padding: 3px 8px; border-radius: 99px; font-size: 10px; font-weight: 600;
  margin-top: 4px; display: inline-block; letter-spacing: 0.04em;
}
.item-score-preview {
  padding: 12px 16px;
  display: flex; flex-direction: column; align-items: flex-end; justify-content: center; gap: 4px;
  border-left: 1px solid var(--border);
  min-width: 90px;
}
.score-chip {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 6px; padding: 3px 8px;
  font-family: 'DM Mono', monospace; font-size: 13px; color: var(--slate);
}
.score-chip.set { background: var(--green-light); border-color: var(--green); color: var(--green); font-weight: 600; }

.item-body { padding: 20px; }

/* Say instruction */
.say-box {
  background: #eff6ff; border: 1px solid #bfdbfe; border-left: 4px solid var(--blue);
  border-radius: 8px; padding: 12px 16px; margin-bottom: 16px;
}
.say-label { font-size: 10px; font-weight: 700; color: var(--blue); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
.say-text { font-size: 13px; color: #1e40af; font-style: italic; line-height: 1.5; }

/* Admin note */
.admin-note {
  background: #fffbeb; border: 1px solid #fde68a; border-radius: 8px;
  padding: 10px 14px; margin-bottom: 16px;
  font-size: 12px; color: #92400e; line-height: 1.5;
  display: flex; gap: 8px; align-items: flex-start;
}
.admin-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }

/* ===== SCORING ===== */
.scoring-grid { display: flex; gap: 0; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.score-btn {
  flex: 1; padding: 10px 4px; text-align: center; cursor: pointer;
  border: none; background: var(--bg);
  transition: all 0.15s; border-right: 1px solid var(--border);
  font-family: 'DM Sans', sans-serif;
}
.score-btn:last-child { border-right: none; }
.score-btn:hover { background: var(--blue-light); }
.score-btn .s-num { font-size: 18px; font-weight: 700; font-family: 'DM Mono', monospace; color: var(--navy-3); }
.score-btn .s-lbl { font-size: 9px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); margin-top: 2px; }
.score-btn.selected-0 { background: #dcfce7; border-color: #86efac; }
.score-btn.selected-0 .s-num { color: var(--green); }
.score-btn.selected-0 .s-lbl { color: var(--green); }
.score-btn.selected-1 { background: #fef3c7; border-color: #fde68a; }
.score-btn.selected-1 .s-num { color: #92400e; }
.score-btn.selected-1 .s-lbl { color: #92400e; }
.score-btn.selected-2 { background: #ffedd5; border-color: #fed7aa; }
.score-btn.selected-2 .s-num { color: #c2410c; }
.score-btn.selected-2 .s-lbl { color: #c2410c; }
.score-btn.selected-3 { background: #fee2e2; border-color: #fca5a5; }
.score-btn.selected-3 .s-num { color: var(--red); }
.score-btn.selected-3 .s-lbl { color: var(--red); }
.score-btn.selected-4 { background: #fecaca; border-color: #f87171; }
.score-btn.selected-4 .s-num { color: #991b1b; }
.score-btn.selected-4 .s-lbl { color: #991b1b; }

.bilateral-scoring { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 8px; }
.side-label { font-size: 11px; font-weight: 600; color: var(--slate); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px; }
.side-label.left { color: #7c3aed; }
.side-label.right { color: #0369a1; }

/* Grading anchors */
.anchors-toggle { font-size: 11px; color: var(--blue); cursor: pointer; text-decoration: none; margin-top: 10px; display: inline-block; font-weight: 500; }
.anchors-table { margin-top: 10px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; display: none; }
.anchors-table.open { display: table; width: 100%; }
.anchors-table th { background: var(--bg); padding: 8px 12px; font-size: 10px; font-weight: 600; color: var(--slate); text-align: left; letter-spacing: 0.05em; text-transform: uppercase; border-bottom: 1px solid var(--border); }
.anchors-table td { padding: 8px 12px; font-size: 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
.anchors-table tr:last-child td { border-bottom: none; }
.anchor-score { font-family: 'DM Mono', monospace; font-weight: 600; font-size: 13px; }
.anchor-0 { color: var(--green); } .anchor-1 { color: #92400e; } .anchor-2 { color: #c2410c; } .anchor-3 { color: var(--red); } .anchor-4 { color: #991b1b; }

.notes-row { margin-top: 14px; }
.notes-input {
  width: 100%; border: 1px solid var(--border); border-radius: 8px;
  padding: 8px 12px; font-size: 12px; font-family: 'DM Sans', sans-serif;
  color: var(--navy); outline: none; resize: none; background: var(--white);
  transition: border-color 0.2s;
}
.notes-input:focus { border-color: var(--blue); }

/* ===== NAV BUTTONS ===== */
.nav-btns { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }

/* ===== SUMMARY VIEW ===== */
.summary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-bottom: 20px; }
.summary-card {
  background: var(--white); border: 1px solid var(--border); border-radius: 10px; padding: 14px;
}
.summary-card-label { font-size: 11px; color: var(--muted); font-weight: 500; margin-bottom: 2px; }
.summary-card-val { font-size: 28px; font-family: 'DM Mono', monospace; font-weight: 500; color: var(--navy); }
.summary-card-sub { font-size: 11px; color: var(--slate); margin-top: 2px; }

.review-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.review-table th { background: var(--bg); padding: 10px 14px; font-size: 11px; font-weight: 600; color: var(--slate); text-align: left; letter-spacing: 0.04em; text-transform: uppercase; border-bottom: 2px solid var(--border); }
.review-table td { padding: 10px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.review-table tr:last-child td { border-bottom: none; }
.review-table tr:hover td { background: var(--bg); }
.editable-score {
  background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
  padding: 4px 8px; font-family: 'DM Mono', monospace; font-size: 13px;
  width: 56px; text-align: center; outline: none;
  font-family: 'DM Sans', sans-serif; color: var(--navy);
  transition: border-color 0.2s;
}
.editable-score:focus { border-color: var(--blue); background: var(--white); }
.score-tag {
  display: inline-block; padding: 3px 8px; border-radius: 99px;
  font-size: 11px; font-weight: 600; font-family: 'DM Mono', monospace;
}
.score-tag-0 { background: var(--green-light); color: var(--green); }
.score-tag-1 { background: var(--amber-light); color: var(--amber); }
.score-tag-2 { background: #ffedd5; color: #c2410c; }
.score-tag-3 { background: var(--red-light); color: var(--red); }
.score-tag-4 { background: #fecaca; color: #991b1b; }
.score-tag-x { background: var(--bg); color: var(--muted); }

/* ===== WELCOME SCREEN ===== */
.welcome { max-width: 680px; margin: 0 auto; }
.welcome-hero {
  background: linear-gradient(135deg, var(--navy) 0%, #1e3a5f 100%);
  border-radius: 16px; padding: 40px; margin-bottom: 24px; color: var(--white);
}
.welcome-eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #93c5fd; margin-bottom: 12px; }
.welcome-title { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 700; line-height: 1.2; margin-bottom: 12px; }
.welcome-desc { color: #cbd5e1; font-size: 14px; line-height: 1.7; }
.welcome-scale {
  display: flex; gap: 8px; margin-top: 24px;
}
.scale-item {
  flex: 1; background: rgba(255,255,255,0.08); border-radius: 8px; padding: 10px 8px; text-align: center;
}
.scale-num { font-size: 20px; font-weight: 700; font-family: 'DM Mono', monospace; }
.scale-lbl { font-size: 10px; color: rgba(255,255,255,0.55); margin-top: 2px; }
.phase-overview { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
.phase-card {
  background: var(--white); border: 1px solid var(--border); border-radius: 10px;
  padding: 14px 16px; display: flex; align-items: flex-start; gap: 12px;
}
.phase-num-box {
  background: var(--navy); color: var(--white); border-radius: 7px;
  width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; flex-shrink: 0;
}
.phase-card-title { font-size: 13px; font-weight: 600; color: var(--navy); }
.phase-card-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
.opening-box {
  background: #eff6ff; border: 1px solid #bfdbfe; border-left: 4px solid var(--blue);
  border-radius: 10px; padding: 16px 18px; margin-bottom: 24px;
}
.opening-label { font-size: 10px; font-weight: 700; color: var(--blue); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; }
.opening-text { font-size: 13px; color: #1e40af; font-style: italic; line-height: 1.6; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 99px; }

/* Responsive */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .bilateral-scoring { grid-template-columns: 1fr; }
  .phase-overview { grid-template-columns: 1fr; }
}

.fade-in { animation: fadeIn 0.25s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.chip-on { background: var(--teal-light); color: var(--teal); border: 1px solid #5eead4; padding: 3px 10px; border-radius: 99px; font-size: 11px; font-weight: 600; }
.chip-off { background: var(--amber-light); color: var(--amber); border: 1px solid #fde68a; padding: 3px 10px; border-radius: 99px; font-size: 11px; font-weight: 600; }
</style>
</head>
<body>

<div class="app-shell">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">MDS-UPDRS<br>Part III</div>
      <div class="sidebar-sub">Motor Examination</div>
    </div>
    <div class="sidebar-progress">
      <div class="progress-label">Progress</div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressBar" style="width:0%"></div></div>
      <div class="progress-text" id="progressText">0 / 18 items scored</div>
      <div class="total-score-pill">
        <span class="total-score-label">Total Score</span>
        <span class="total-score-val" id="sidebarTotal">—</span>
      </div>
    </div>
    <nav class="nav-section" id="navSection"></nav>
    <div class="sidebar-footer">
      <div class="meta-field">
        <label>Patient ID</label>
        <input class="meta-input" id="metaPatient" placeholder="e.g. PD-2024-001">
      </div>
      <div class="meta-field">
        <label>Examiner</label>
        <input class="meta-input" id="metaExaminer" placeholder="Name">
      </div>
      <div class="meta-field">
        <label>Medication Status</label>
        <select class="meta-select" id="metaMeds">
          <option value="">Select…</option>
          <option value="ON">ON</option>
          <option value="OFF">OFF</option>
          <option value="Unknown">Unknown</option>
        </select>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <header class="topbar">
      <div class="topbar-left">
        <span class="phase-badge" id="topPhaseBadge">Welcome</span>
        <span class="item-title" id="topItemTitle">MDS-UPDRS Part III Scorer</span>
      </div>
      <div class="topbar-right">
        <button class="btn btn-outline btn-sm" onclick="showView('summary')" id="summaryBtn">📋 Review & Edit</button>
        <button class="btn btn-green btn-sm" onclick="exportExcel()">⬇ Export Excel</button>
      </div>
    </header>
    <div class="content" id="mainContent"></div>
  </main>
</div>

<script>
// ===== DATA MODEL =====
const ITEMS = [
  {
    id: '3.1', phase: 1, phaseName: 'Observation & Speech',
    name: 'Speech',
    bilateral: false,
    say: 'Can you tell me a little about why you are here today, or walk me through what you did this morning?',
    admin: 'Engage in natural conversation first. Assess spontaneous speech throughout the encounter, not just this prompt. Listen for the full response.',
    anchors: [
      [0,'Normal','Normal volume, clarity and rhythm'],
      [1,'Slight','Slightly low volume, slurred, or monotone; no difficulty being understood'],
      [2,'Mild','Monotone or slurred speech; listener must concentrate; some words hard to understand'],
      [3,'Moderate','Significantly difficult to understand; much of speech unintelligible'],
      [4,'Severe','Mostly unintelligible or mute'],
    ]
  },
  {
    id: '3.2', phase: 1, phaseName: 'Observation & Speech',
    name: 'Facial Expression',
    bilateral: false,
    say: 'Just look straight ahead at me for a moment with your face relaxed.',
    admin: 'Observe throughout conversation AND at rest. Check blink rate and spontaneous smiling.',
    anchors: [
      [0,'Normal','Normal facial mobility, no mask-like face'],
      [1,'Slight','Slight hypomimia; may just appear "serious"; possibly normal for age'],
      [2,'Mild','Mild but definite hypomimia; decreased blink rate'],
      [3,'Moderate','Marked hypomimia; mouth may be open at rest; intermittent smiling'],
      [4,'Severe','Fixed, mask-like face; severe loss of expression; mouth open'],
    ]
  },
  {
    id: '3.3', phase: 2, phaseName: 'Rigidity',

// Scores storage: { '3.1': 2, '3.3_L': 1, '3.3_R': 0, ... }
let scores = {};
let notes = {};
let currentView = 'welcome'; // 'welcome' | 'item-3.1' | ... | 'summary'
let anchorsOpen = {};

// ===== SCORE HELPERS =====
function getItemScore(item) {
  if (item.bilateral) {
    const L = scores[item.id + '_L'];
    const R = scores[item.id + '_R'];
    if (L === undefined && R === undefined) return null;
    return (L !== undefined ? L : 0) + (R !== undefined ? R : 0);
  }
  return scores[item.id] !== undefined ? scores[item.id] : null;
}

function isItemScored(item) {
  if (item.bilateral) return scores[item.id + '_L'] !== undefined && scores[item.id + '_R'] !== undefined;
  return scores[item.id] !== undefined;
}

function getTotalScore() {
  return ITEMS.reduce((t, item) => {
    const s = getItemScore(item);
    return t + (s !== null ? s : 0);
  }, 0);
}

function getScoredCount() {
  return ITEMS.filter(isItemScored).length;
}

// ===== UI UPDATES =====
function updateProgress() {
  const n = getScoredCount();
  const total = ITEMS.length;
  const pct = Math.round(n / total * 100);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${n} / ${total} items scored`;
  const ts = getTotalScore();
  document.getElementById('sidebarTotal').textContent = n > 0 ? ts : '—';
}

function buildNav() {
  const nav = document.getElementById('navSection');
  nav.innerHTML = '';

  // Welcome
  const welcomeEl = document.createElement('div');
  welcomeEl.className = 'nav-item' + (currentView === 'welcome' ? ' active' : '');
  welcomeEl.innerHTML = `<div class="nav-dot"></div><div style="flex:1"><div class="nav-item-text">Overview</div></div>`;
  welcomeEl.onclick = () => showView('welcome');
  nav.appendChild(welcomeEl);

  let lastPhase = null;
  ITEMS.forEach(item => {
    if (item.phase !== lastPhase) {
      const label = document.createElement('div');
      label.className = 'nav-phase-label';
      label.textContent = `Phase ${item.phase} · ${item.phaseName}`;
      nav.appendChild(label);
      lastPhase = item.phase;
    }
    const el = document.createElement('div');
    const isActive = currentView === 'item-' + item.id;
    const isScored = isItemScored(item);
    el.className = 'nav-item' + (isActive ? ' active' : '') + (isScored ? ' completed' : '');
    el.innerHTML = `
      <div class="nav-dot"></div>
      <div style="flex:1">
        <div class="nav-item-code">${item.id}</div>
        <div class="nav-item-text">${item.name}</div>
      </div>
    `;
    el.onclick = () => showView('item-' + item.id);
    nav.appendChild(el);
  });

  // Summary
  const summEl = document.createElement('div');
  summEl.className = 'nav-item' + (currentView === 'summary' ? ' active' : '');
  summEl.innerHTML = `<div class="nav-dot"></div><div style="flex:1"><div class="nav-item-text">📋 Review & Export</div></div>`;
  summEl.onclick = () => showView('summary');
  nav.appendChild(summEl);
}

// ===== VIEWS =====
function showView(viewId) {
  currentView = viewId;
  buildNav();

  const content = document.getElementById('mainContent');
  content.innerHTML = '';
  content.classList.add('fade-in');
  setTimeout(() => content.classList.remove('fade-in'), 300);

  if (viewId === 'welcome') {
    document.getElementById('topPhaseBadge').textContent = 'Overview';
    document.getElementById('topItemTitle').textContent = 'MDS-UPDRS Part III Scorer';
    content.appendChild(renderWelcome());
  } else if (viewId === 'summary') {
    document.getElementById('topPhaseBadge').textContent = 'Review';
    document.getElementById('topItemTitle').textContent = 'Score Summary & Export';
    content.appendChild(renderSummary());
  } else if (viewId.startsWith('item-')) {
    const itemId = viewId.replace('item-', '');
    const item = ITEMS.find(i => i.id === itemId);
    if (item) {
      document.getElementById('topPhaseBadge').textContent = `Phase ${item.phase} · ${item.phaseName}`;
      document.getElementById('topItemTitle').textContent = item.id + ' · ' + item.name;
      content.appendChild(renderItem(item));
    }
  }
  updateProgress();
}

function renderItem(item) {
  const wrapper = document.createElement('div');

  // Item card
  const card = document.createElement('div');
  const isScored = isItemScored(item);
  card.className = 'item-card' + (item.bilateral ? ' bilateral' : '') + (isScored ? ' scored' : '');

  // Header
  let scorePreviewHTML = '';
  if (item.bilateral) {
    const L = scores[item.id + '_L'];
    const R = scores[item.id + '_R'];
    scorePreviewHTML = `
      <div class="score-chip ${L !== undefined ? 'set' : ''}">L: ${L !== undefined ? L : '—'}</div>
      <div class="score-chip ${R !== undefined ? 'set' : ''}">R: ${R !== undefined ? R : '—'}</div>
    `;
  } else {
    const s = scores[item.id];
    scorePreviewHTML = `<div class="score-chip ${s !== undefined ? 'set' : ''}">${s !== undefined ? s : '—'}</div>`;
  }

  card.innerHTML = `
    <div class="item-header">
      <div class="item-code-box">${item.id}</div>
      <div class="item-title-area">
        <div class="item-name">${item.name}</div>
        ${item.bilateral ? '<span class="bilateral-tag">Score Left & Right separately</span>' : '<div class="item-subtitle">Single score</div>'}
      </div>
      <div class="item-score-preview">${scorePreviewHTML}</div>
    </div>
    <div class="item-body" id="itemBody-${item.id}"></div>
  `;

  const body = card.querySelector(`#itemBody-${item.id}`);

  // Admin note
  if (item.admin) {
    const n = document.createElement('div');
    n.className = 'admin-note';
    n.innerHTML = `<span class="admin-icon">ℹ</span><span>${item.admin}</span>`;
    body.appendChild(n);
  }

  // Say box
  if (item.say) {
    const s = document.createElement('div');
    s.className = 'say-box';
    s.innerHTML = `<div class="say-label">Say to patient</div><div class="say-text">"${item.say}"</div>`;
    body.appendChild(s);
  }

  // Scoring
  if (item.bilateral) {
    const bg = document.createElement('div');
    bg.className = 'bilateral-scoring';

    ['L', 'R'].forEach(side => {
      const col = document.createElement('div');
      const sideLabel = document.createElement('div');
      sideLabel.className = `side-label ${side === 'L' ? 'left' : 'right'}`;
      sideLabel.textContent = side === 'L' ? '◀ LEFT' : '▶ RIGHT';
      col.appendChild(sideLabel);
      col.appendChild(buildScoreGrid(item.id + '_' + side, item, card));
      bg.appendChild(col);
    });
    body.appendChild(bg);
  } else {
    body.appendChild(buildScoreGrid(item.id, item, card));
  }

  // Grading anchors
  const anchorKey = item.id;
  const toggle = document.createElement('a');
  toggle.className = 'anchors-toggle';
  toggle.textContent = anchorsOpen[anchorKey] ? '▲ Hide grading anchors' : '▼ Show grading anchors';
  toggle.onclick = () => {
    anchorsOpen[anchorKey] = !anchorsOpen[anchorKey];
    toggle.textContent = anchorsOpen[anchorKey] ? '▲ Hide grading anchors' : '▼ Show grading anchors';
    const table = body.querySelector('.anchors-table');
    table.classList.toggle('open', anchorsOpen[anchorKey]);
  };
  body.appendChild(toggle);

  const table = document.createElement('table');
  table.className = 'anchors-table' + (anchorsOpen[anchorKey] ? ' open' : '');
  table.innerHTML = `<thead><tr><th style="width:40px">Score</th><th style="width:90px">Label</th><th>Description</th></tr></thead>`;
  const tbody = document.createElement('tbody');
  item.anchors.forEach(([s, lbl, desc]) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td><span class="anchor-score anchor-${s}">${s}</span></td><td style="font-weight:600;font-size:12px">${lbl}</td><td style="color:#475569">${desc}</td>`;
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  body.appendChild(table);

  // Notes
  const notesRow = document.createElement('div');
  notesRow.className = 'notes-row';
  const notesInp = document.createElement('textarea');
  notesInp.className = 'notes-input';
  notesInp.rows = 2;
  notesInp.placeholder = 'Notes for this item (optional)…';
  notesInp.value = notes[item.id] || '';
  notesInp.oninput = () => { notes[item.id] = notesInp.value; };
  notesRow.appendChild(notesInp);
  body.appendChild(notesRow);

  wrapper.appendChild(card);

  // Nav buttons
  const idx = ITEMS.findIndex(i => i.id === item.id);
  const prev = idx > 0 ? ITEMS[idx - 1] : null;
  const next = idx < ITEMS.length - 1 ? ITEMS[idx + 1] : null;

  const navBtns = document.createElement('div');
  navBtns.className = 'nav-btns';
  navBtns.innerHTML = `
    <button class="btn btn-outline" onclick="${prev ? `showView('item-${prev.id}')` : `showView('welcome')`}">
      ← ${prev ? prev.id + ' · ' + prev.name : 'Overview'}
    </button>
    <button class="btn btn-primary" onclick="${next ? `showView('item-${next.id}')` : `showView('summary')`}">
      ${next ? next.id + ' · ' + next.name + ' →' : '📋 Review & Export →'}
    </button>
  `;
  wrapper.appendChild(navBtns);

  return wrapper;
}

function buildScoreGrid(key, item, cardEl) {
  const grid = document.createElement('div');
  grid.className = 'scoring-grid';
  const labels = ['Normal', 'Slight', 'Mild', 'Moderate', 'Severe'];
  [0, 1, 2, 3, 4].forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'score-btn' + (scores[key] === s ? ` selected-${s}` : '');
    btn.innerHTML = `<div class="s-num">${s}</div><div class="s-lbl">${labels[s]}</div>`;
    btn.onclick = () => {
      scores[key] = s;
      // Refresh the card
      const newCard = renderItem(item);
      cardEl.replaceWith(newCard.firstChild);
      updateProgress();
      buildNav();
    };
    grid.appendChild(btn);
  });
  return grid;
}

        <div class="summary-card-label">Total Score</div>
        <div class="summary-card-val" id="sumTotal">${ts}</div>
        <div class="summary-card-sub">out of ${ITEMS.reduce((a,i) => a + (i.bilateral ? 8 : 4), 0)} max</div>
      </div>
      <div class="summary-card">
        <div class="summary-card-label">Items Scored</div>
        <div class="summary-card-val">${scored} / ${total}</div>
        <div class="summary-card-sub">${total - scored} remaining</div>
      </div>
      <div class="summary-card">
        <div class="summary-card-label">Patient ID</div>
        <div class="summary-card-val" style="font-size:16px;margin-top:4px">${document.getElementById('metaPatient').value || '—'}</div>
        <div class="summary-card-sub">Meds: ${document.getElementById('metaMeds').value || '—'}</div>
      </div>
      <div class="summary-card">
        <div class="summary-card-label">Date / Time</div>
        <div class="summary-card-val" style="font-size:16px;margin-top:4px">${new Date().toLocaleDateString()}</div>
        <div class="summary-card-sub">${new Date().toLocaleTimeString()}</div>
      </div>
    </div>
  `;

  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="card-header">
      <span class="card-title">Score Sheet — Click any score to edit</span>
      <button class="btn btn-green btn-sm" onclick="exportExcel()">⬇ Export to Excel</button>
    </div>
  `;
  const tbody = document.createElement('div');
  tbody.style.overflowX = 'auto';

  const table = document.createElement('table');
  table.className = 'review-table';
  table.style.width = '100%';
  table.innerHTML = `
    <thead><tr>
      <th>Item</th>
      <th>Name</th>
      <th>Phase</th>
      <th style="text-align:center">Left / Single</th>
      <th style="text-align:center">Right</th>
      <th style="text-align:center">Item Total</th>
      <th>Notes</th>
    </tr></thead>
  `;
  const tbodyEl = document.createElement('tbody');

  ITEMS.forEach(item => {
    const tr = document.createElement('tr');
    const itemTotal = getItemScore(item);

    if (item.bilateral) {
      const L = scores[item.id + '_L'];
      const R = scores[item.id + '_R'];

      tr.innerHTML = `
        <td><strong style="font-family:'DM Mono',monospace">${item.id}</strong></td>
        <td>${item.name}</td>
        <td style="color:var(--muted);font-size:12px">Phase ${item.phase}</td>
        <td style="text-align:center">${editableScore(item.id + '_L', L, table, div)}</td>
        <td style="text-align:center">${editableScore(item.id + '_R', R, table, div)}</td>
        <td style="text-align:center">${itemTotal !== null ? `<span class="score-tag score-tag-${Math.min(4, itemTotal)}">${itemTotal}</span>` : '<span class="score-tag score-tag-x">—</span>'}</td>
        <td><input class="notes-input" style="border-radius:6px" placeholder="notes…" value="${notes[item.id] || ''}" onchange="notes['${item.id}']=this.value"></td>
      `;
    } else {
      const s = scores[item.id];
      tr.innerHTML = `
        <td><strong style="font-family:'DM Mono',monospace">${item.id}</strong></td>
        <td>${item.name}</td>
        <td style="color:var(--muted);font-size:12px">Phase ${item.phase}</td>
        <td style="text-align:center" colspan="2">${editableScore(item.id, s, table, div)}</td>
        <td style="text-align:center">${s !== undefined ? `<span class="score-tag score-tag-${s}">${s}</span>` : '<span class="score-tag score-tag-x">—</span>'}</td>
        <td><input class="notes-input" style="border-radius:6px" placeholder="notes…" value="${notes[item.id] || ''}" onchange="notes['${item.id}']=this.value"></td>
      `;
    }
    tbodyEl.appendChild(tr);
  });

  // Total row
  const totalTr = document.createElement('tr');
  totalTr.style.background = 'var(--navy)';
  totalTr.innerHTML = `
    <td colspan="5" style="padding:12px 14px;color:white;font-weight:700;font-size:14px;text-align:right">TOTAL SCORE</td>
    <td style="text-align:center;padding:12px 14px"><span style="color:white;font-family:'DM Mono',monospace;font-size:20px;font-weight:700" id="summaryTotalScore">${ts}</span></td>
    <td style="padding:12px 14px;color:var(--muted)">/ ${ITEMS.reduce((a,i) => a + (i.bilateral ? 8 : 4), 0)} max</td>
  `;
  tbodyEl.appendChild(totalTr);

  table.appendChild(tbodyEl);
  tbody.appendChild(table);
  card.appendChild(tbody);
  div.appendChild(card);

  return div;
}

function editableScore(key, currentVal, table, parentDiv) {
  const val = currentVal !== undefined ? currentVal : '';
  return `<input class="editable-score" type="number" min="0" max="4" value="${val}" placeholder="—" 
    onchange="updateScoreFromTable('${key}', this.value, this)" 
    onfocus="this.select()">`;
}

function updateScoreFromTable(key, val, el) {
  const v = parseInt(val);
  if (isNaN(v) || v < 0 || v > 4) { el.value = scores[key] !== undefined ? scores[key] : ''; return; }
  scores[key] = v;
  updateProgress();
  buildNav();
  // update total in summary
  const totalEl = document.getElementById('summaryTotalScore');
  if (totalEl) totalEl.textContent = getTotalScore();
  const sumTotalEl = document.getElementById('sumTotal');
  if (sumTotalEl) sumTotalEl.textContent = getTotalScore();
}

// ===== EXCEL EXPORT =====
function exportExcel() {
  const wb = XLSX.utils.book_new();

  // Sheet 1: Scores
  const scoresData = [
    ['MDS-UPDRS Part III · Motor Examination'],
    [],
    ['Patient ID', document.getElementById('metaPatient').value || ''],
    ['Examiner', document.getElementById('metaExaminer').value || ''],
    ['Medication Status', document.getElementById('metaMeds').value || ''],
    ['Date', new Date().toLocaleDateString()],
    ['Time', new Date().toLocaleTimeString()],
    [],
    ['Item', 'Name', 'Phase', 'Left / Single', 'Right', 'Item Total', 'Notes'],
  ];

  ITEMS.forEach(item => {
    if (item.bilateral) {
      const L = scores[item.id + '_L'];
      const R = scores[item.id + '_R'];
      const tot = (L !== undefined ? L : 0) + (R !== undefined ? R : 0);
      scoresData.push([
        item.id, item.name, `Phase ${item.phase} · ${item.phaseName}`,
        L !== undefined ? L : '',
        R !== undefined ? R : '',
        (L !== undefined && R !== undefined) ? tot : '',
        notes[item.id] || ''
      ]);
    } else {
      const s = scores[item.id];
      scoresData.push([
        item.id, item.name, `Phase ${item.phase} · ${item.phaseName}`,
        s !== undefined ? s : '', '', s !== undefined ? s : '',
        notes[item.id] || ''
      ]);
    }
  });

  scoresData.push([]);
  scoresData.push(['TOTAL SCORE', '', '', '', '', getTotalScore(), '']);

  const ws1 = XLSX.utils.aoa_to_sheet(scoresData);

  // Column widths
  ws1['!cols'] = [
    { wch: 8 }, { wch: 30 }, { wch: 28 }, { wch: 14 }, { wch: 10 }, { wch: 12 }, { wch: 40 }
  ];

  XLSX.utils.book_append_sheet(wb, ws1, 'Scores');

  // Sheet 2: Raw Data (one row per key)
  const rawData = [['Key', 'Value', 'Item', 'Side']];
  ITEMS.forEach(item => {
    if (item.bilateral) {
      ['L', 'R'].forEach(side => {
        const k = item.id + '_' + side;
        rawData.push([k, scores[k] !== undefined ? scores[k] : '', item.name, side]);
      });
    } else {
      rawData.push([item.id, scores[item.id] !== undefined ? scores[item.id] : '', item.name, 'N/A']);
    }
  });
  rawData.push(['TOTAL', getTotalScore(), '', '']);
  const ws2 = XLSX.utils.aoa_to_sheet(rawData);
  ws2['!cols'] = [{ wch: 14 }, { wch: 8 }, { wch: 30 }, { wch: 8 }];
  XLSX.utils.book_append_sheet(wb, ws2, 'Raw Data');

  const patient = document.getElementById('metaPatient').value || 'patient';
  const date = new Date().toISOString().slice(0, 10);
  XLSX.writeFile(wb, `UPDRS_III_${patient}_${date}.xlsx`);
}

// ===== INIT =====
showView('welcome');
</script>
